.app-root {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: var(--yaar-bg);
  color: var(--yaar-text);
  font-family: var(--yaar-font, system-ui);
  overflow: hidden;
  user-select: none;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 48px;
  background: var(--yaar-bg-surface);
  border-bottom: 1px solid var(--yaar-border);
  flex-shrink: 0;
}

.header-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.05em;
}

.header-title .icon { font-size: 18px; }

.header-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* Transport */
.transport {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  background: var(--yaar-bg-surface);
  border-bottom: 1px solid var(--yaar-border);
  flex-shrink: 0;
}

.btn-play {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
  background: var(--yaar-accent);
  color: #fff;
}

.btn-play:hover { filter: brightness(1.15); transform: scale(1.05); }
.btn-play.playing { background: var(--yaar-error); }

.bpm-control {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  max-width: 280px;
}

.bpm-control label {
  font-size: 11px;
  color: var(--yaar-text-muted);
  letter-spacing: 0.05em;
  white-space: nowrap;
}

.bpm-value {
  font-size: 13px;
  font-weight: 700;
  color: var(--yaar-accent);
  min-width: 32px;
  text-align: right;
}

input[type=range].bpm-slider {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  border-radius: 2px;
  background: var(--yaar-border);
  outline: none;
  cursor: pointer;
}

input[type=range].bpm-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--yaar-accent);
  cursor: pointer;
  transition: transform 0.1s;
}

input[type=range].bpm-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

.transport-badge {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 10px;
  background: var(--yaar-border);
  color: var(--yaar-text-muted);
}

.transport-badge.active {
  background: #3fb95022;
  color: var(--yaar-success);
}

.transport-badge .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

.transport-badge.active .dot { animation: pulse 1s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* Main layout */
.main {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--yaar-border);
  background: var(--yaar-bg-surface);
  overflow-y: auto;
}

.sidebar-section {
  padding: 12px;
  border-bottom: 1px solid var(--yaar-border);
}

.sidebar-section label {
  display: block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--yaar-text-muted);
  margin-bottom: 6px;
}

/* Canvas area */
.canvas-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  padding: 12px;
  gap: 12px;
  overflow: hidden;
}

.visualizer-canvas {
  width: 100%;
  flex: 1;
  border-radius: var(--yaar-radius);
  border: 1px solid var(--yaar-border);
  display: block;
}

/* Drum grid */
.drum-grid {
  background: var(--yaar-bg);
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius);
  padding: 10px 12px;
  flex-shrink: 0;
}

.drum-grid-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.drum-grid-header span {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--yaar-text-muted);
}

.drum-row {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 6px;
}

.drum-row:last-child { margin-bottom: 0; }

.drum-label {
  width: 52px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  flex-shrink: 0;
}

.drum-steps {
  display: flex;
  gap: 2px;
  flex: 1;
}

.step-btn {
  flex: 1;
  height: 24px;
  border: 1px solid var(--yaar-border);
  border-radius: 3px;
  background: transparent;
  cursor: pointer;
  transition: all 0.1s;
  min-width: 0;
  position: relative;
}

.step-btn:nth-child(4n+1) { border-color: #30363d88; }

.step-btn.active {
  border-color: transparent;
}

.step-btn.current-step {
  box-shadow: 0 0 0 1.5px #ffffff66;
}

/* Group beat markers */
.drum-beat-markers {
  display: flex;
  margin-left: 56px;
  gap: 2px;
  margin-bottom: 4px;
}

.beat-marker {
  flex: 1;
  height: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: var(--yaar-text-muted);
}

.beat-marker.strong { color: var(--yaar-text); }

		 * @param channel number

		 * @param index number

			for (const paramName in parameters) {

				} else {

	/**
	 * A multichannel buffer for use within an AudioWorkletProcessor as a delay line
	 */
	class DelayLine {
		
		constructor(size, channels) {
			this.buffer = [];
			this.writeHead = []
			this.size = size;

			// create the empty channels
			for (let i = 0; i < channels; i++) {
				this.buffer[i] = new Float32Array(this.size);
				this.writeHead[i] = 0;
			}
		}

		/**
		 * Push a value onto the end
		 * @param channel number
		 * @param value number
		 */
		push(channel, value) {
			this.writeHead[channel] += 1;
			if (this.writeHead[channel] > this.size) {
				this.writeHead[channel] = 0;
			}
			this.buffer[channel][this.writeHead[channel]] = value;
		}

		/**
		 * Get the recorded value of the channel given the delay
		 * @param channel number
		 * @param delay number delay samples
		 */
		get(channel, delay) {
			let readHead = this.writeHead[channel] - Math.floor(delay);
			if (readHead < 0) {
				readHead += this.size;
			}
			return this.buffer[channel][readHead];
		}
	}

		constructor(options) {
			super(options);

		}

			return [{

				defaultValue: 0.1,
				minValue: 0,
				maxValue: 1,
				automationRate: "k-rate"

				name: "feedback",
				defaultValue: 0.5,
				minValue: 0,
				maxValue: 0.9999,

			const delayedSample = this.delayLine.get(channel, parameters.delayTime * this.sampleRate);

		}
	}
