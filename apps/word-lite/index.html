  box-sizing: border-box;
}
html,
body {
  margin: 0;
  height: 100%;
  font-family: var(--yaar-font);
  background: var(--yaar-bg);
}
#app {
  height: 100%;
}

/* ── App Shell (dark UI chrome) ── */
.app-shell {
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  height: 100%;
  color: var(--yaar-text);
  background: var(--yaar-bg);
}

/* ── Topbar (dark) ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--yaar-bg-surface);
  border-bottom: 1px solid var(--yaar-border);
  color: var(--yaar-text);
}
.brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  color: var(--yaar-text);
}
.doc-meta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.doc-title-input {
  min-width: 220px;
  background: var(--yaar-bg);
  color: var(--yaar-text);
  border-color: var(--yaar-border);
}
.brand-badge {
  width: 26px;
  height: 26px;
  border-radius: 7px;
  background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 13px;
}

/* ── Toolbar (dark) ── */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 10px 12px;
  background: var(--yaar-bg-surface);
  border-bottom: 1px solid var(--yaar-border);
}
.group {
  display: inline-flex;
  gap: 6px;
  padding-right: 8px;
  margin-right: 4px;
  border-right: 1px solid var(--yaar-border);
}
.group:last-child {
  border-right: 0;
  padding-right: 0;
}

/* ── White border on all buttons ── */
.app-shell button,
.app-shell .y-btn {
  border: 1px solid white !important;
  color: var(--yaar-text) !important;
}

/* ── Toolbar select (dark) ── */
.toolbar select,
.toolbar .y-input {
  background: var(--yaar-bg);
  color: var(--yaar-text);
  border-color: var(--yaar-border);
}

/* ── Editor wrap — dark canvas behind the page ── */
.editor-wrap {
  overflow: auto;
  padding: 24px;
  background: #0d1117;
}

/* ── Page — WHITE editor content area ── */
.page {
  max-width: 860px;
  min-height: calc(100% - 4px);
  margin: 0 auto;
  background: #ffffff;
  border: 1px solid #d0d7de;
  border-radius: 10px;
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.4);
  color: #1a1a1a;
  padding: 36px 44px;
  outline: none;
  line-height: 1.5;
  font-size: 16px;
  cursor: text;
}
.page a,
.page a:link,
.page a:visited,
.page a:hover,
.page a:active,
.page a:focus,
.page a * {
  cursor: pointer !important;
  color: #0969da;
}
.page a:hover {
  text-decoration: underline;
}
.page:empty:before {
  content: attr(data-placeholder);
  color: #999;
}

/* ── Statusbar (dark) ── */
.statusbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: var(--yaar-bg-surface);
  border-top: 1px solid var(--yaar-border);
  color: var(--yaar-text-muted);
}

/* ── Focus mode ── */
.app-shell.focus-mode .topbar,
.app-shell.focus-mode .toolbar,
.app-shell.focus-mode .statusbar {
  display: none;
}
.app-shell.focus-mode .editor-wrap {
  padding: 12px;
}

.muted {
  color: var(--yaar-text-muted);
}
