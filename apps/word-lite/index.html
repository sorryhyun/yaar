:root {

  --yaar-success: #3fb950;
  --yaar-error: #f85149;
  --yaar-warning: #d29922;
  --yaar-sp-1: 4px;
  --yaar-sp-2: 8px;
  --yaar-sp-3: 12px;
  --yaar-sp-4: 16px;
  --yaar-sp-5: 20px;
  --yaar-sp-6: 24px;

  box-sizing: border-box;
}
html,
body {
  margin: 0;
  height: 100%;
  font-family:
    Inter,
    system-ui,
    -apple-system,
    Segoe UI,
    Roboto,
    Arial,
    sans-serif;
  background: var(--yaar-bg);
}
#app {
  height: 100%;
}
.app-shell {
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  height: 100%;
  color: #e5e7eb;
}
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--yaar-bg-surface);
  border-bottom: 1px solid var(--yaar-border);
}
.brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
}
.doc-meta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.doc-title-input {
  min-width: 220px;
}
.brand-badge {
  width: 26px;
  height: 26px;
  border-radius: 7px;
  background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 13px;
}
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 10px 12px;
  background: var(--yaar-bg-surface);
  border-bottom: 1px solid var(--yaar-border);
}
.group {
  display: inline-flex;
  gap: 6px;
  padding-right: 8px;
  margin-right: 4px;
  border-right: 1px solid var(--yaar-border);
}
.group:last-child {
  border-right: 0;
  padding-right: 0;
}
.editor-wrap {
  overflow: auto;
  padding: 24px;
  background: #0b1220;
}
.page {
  max-width: 860px;
  min-height: calc(100% - 4px);
  margin: 0 auto;
  background: #ffffff;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
  color: #111827;
  padding: 36px 44px;
  outline: none;
  line-height: 1.5;
  font-size: 16px;
  cursor: text;
}
.page a,
.page a:link,
.page a:visited,
.page a:hover,
.page a:active,
.page a:focus,
.page a * {
  cursor: pointer !important;
}
.page a:hover {
  text-decoration: underline;
}
.page:empty:before {
  content: attr(data-placeholder);
  color: #9ca3af;
}
.statusbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: var(--yaar-bg-surface);
  border-top: 1px solid var(--yaar-border);
  color: var(--yaar-text-muted);
}
.app-shell.focus-mode .topbar,
.app-shell.focus-mode .toolbar,
.app-shell.focus-mode .statusbar {
  display: none;
}
.app-shell.focus-mode .editor-wrap {
  padding: 12px;
}
.muted {
  color: var(--yaar-text-muted);
}
