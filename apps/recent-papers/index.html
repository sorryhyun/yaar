  box-sizing: border-box;

body {
  margin: 0;
  font-family: var(--yaar-font);
  background: var(--yaar-bg);
  color: var(--yaar-text);
  overflow-y: auto;
}
.wrap {
  max-width: 980px;
  margin: 0 auto;
  padding: 16px;
}
.top {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
h1 {
  margin: 0;
  font-size: 20px;
}
.spacer {
  flex: 1;
}
.muted {
  color: var(--yaar-text-muted);
  font-size: 13px;
}
input,
button,
select {
  background: var(--yaar-bg-surface);
  color: var(--yaar-text);
  border: 1px solid var(--yaar-border);
  border-radius: 10px;
  padding: 8px 10px;
  font: inherit;
}
button {
  cursor: pointer;
}
button:hover {
  border-color: var(--yaar-accent);
}
input {
  min-width: 270px;
}
.recommend-btn {
  border-color: var(--yaar-accent);
}
.recommend-box {
  margin-top: 10px;
  margin-bottom: 10px;
  padding: 10px 12px;
  border: 1px solid var(--yaar-border);
  border-radius: 12px;
  background: var(--yaar-bg-surface);
}
.recommend-title {
  margin: 0 0 8px;
  color: var(--yaar-success);
  font-size: 14px;
}
.recommend-item {
  margin: 0 0 8px;
  font-size: 13px;
  color: var(--yaar-text);
}
.recommend-item:last-child {
  margin-bottom: 0;
}
.recommend-item a {
  color: var(--yaar-accent);
  text-decoration: none;
}
.recommend-item a:hover {
  text-decoration: underline;
}
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}
.card {
  background: var(--yaar-bg-surface);
  border: 1px solid var(--yaar-border);
  border-radius: 12px;
  overflow: hidden;
}
.card-inner {
  display: grid;
  grid-template-columns: 170px 1fr;
  gap: 12px;
}
.thumb {
  width: 100%;
  height: 100%;
  min-height: 130px;
  object-fit: cover;
  background: var(--yaar-bg);
}
.content {
  padding: 12px 14px 14px 0;
}
.title {
  margin: 0 0 8px;
  font-size: 17px;
  line-height: 1.3;
}
.title a {
  color: var(--yaar-text);
  text-decoration: none;
}
.title a:hover {
  color: var(--yaar-accent);
  text-decoration: underline;
}
.meta {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  color: var(--yaar-text-muted);
  font-size: 12px;
  margin-bottom: 8px;
}
.summary {
  margin: 0;
  color: var(--yaar-text);
  font-size: 14px;
  line-height: 1.45;
}
.links {
  margin-top: 10px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.links a {
  color: var(--yaar-accent);
  font-size: 13px;
  text-decoration: none;
}
.links a:hover {
  text-decoration: underline;
}
.tag {
  display: inline-block;
  padding: 2px 8px;
  border: 1px solid var(--yaar-border);
  border-radius: 99px;
  font-size: 11px;
}
.empty {
  padding: 24px;
  text-align: center;
  border: 1px dashed var(--yaar-border);
  border-radius: 12px;
  color: var(--yaar-text-muted);
}
.chart-btn {
  border-color: var(--yaar-accent);
}
.chart-panel {
  background: var(--yaar-bg-surface);
  border: 1px solid var(--yaar-border);
  border-radius: 8px;
  padding: 10px 14px 14px;
  margin: 8px 0;
}
.chart-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--yaar-text);
}
.chart-wrap {
  height: 160px;
  position: relative;
}
.chart-wrap canvas {
  width: 100% !important;
}
@media (max-width: 760px) {
  .card-inner {
    grid-template-columns: 1fr;
  }
  .content {
    padding: 0 12px 12px 12px;
  }
  .thumb {
    min-height: 180px;
  }
  input {
    min-width: 100%;
