* {

}
.wrap {

  margin: 0 auto;
  padding: 16px;
}
.top {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
h1 {
  margin: 0;
  font-size: 20px;
}
.spacer {
  flex: 1;
}
.muted {
  color: var(--muted);
  font-size: 13px;
}
input,
button,
select {
  background: #202838;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 10px;
  font: inherit;
}
button {
  cursor: pointer;
}
button:hover {
  border-color: #3b4660;
}
input {
  min-width: 270px;
}
.recommend-btn {
  border-color: #385995;
}
.recommend-box {
  margin-top: 10px;
  margin-bottom: 10px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: #141a25;
}
.recommend-title {
  margin: 0 0 8px;
  color: var(--good);
  font-size: 14px;
}
.recommend-item {
  margin: 0 0 8px;
  font-size: 13px;
  color: #d5deea;
}
.recommend-item:last-child {
  margin-bottom: 0;
}
.recommend-item a {
  color: var(--accent);
  text-decoration: none;
}
.recommend-item a:hover {
  text-decoration: underline;
}
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.card-inner {
  display: grid;
  grid-template-columns: 170px 1fr;
  gap: 12px;
}
.thumb {
  width: 100%;
  height: 100%;
  min-height: 130px;
  object-fit: cover;
  background: #11151f;
}
.content {
  padding: 12px 14px 14px 0;
}
.title {
  margin: 0 0 8px;
  font-size: 17px;
  line-height: 1.3;
}
.title a {
  color: var(--text);
  text-decoration: none;
}
.title a:hover {
  color: var(--accent);
  text-decoration: underline;
}
.meta {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  color: var(--muted);
  font-size: 12px;
  margin-bottom: 8px;
}
.summary {
  margin: 0;
  color: #cdd6e3;
  font-size: 14px;
  line-height: 1.45;
}
.links {
  margin-top: 10px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.links a {
  color: var(--accent);
  font-size: 13px;
  text-decoration: none;
}
.links a:hover {
  text-decoration: underline;
}
.tag {
  display: inline-block;
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: 99px;
  font-size: 11px;
}
.empty {
  padding: 24px;
  text-align: center;
  border: 1px dashed var(--border);
  border-radius: 12px;
  color: var(--muted);
}
@media (max-width: 760px) {
  .card-inner {
    grid-template-columns: 1fr;
  }
  .content {
    padding: 0 12px 12px 12px;
  }
  .thumb {
    min-height: 180px;
  }
  input {
    min-width: 100%;
  }
}
