:root {
  --yaar-bg: #0f1117;
  --yaar-bg-surface: #161b22;
  --yaar-bg-surface-hover: #1c2129;
  --yaar-text: #e6edf3;
  --yaar-text-muted: #8b949e;
  --yaar-text-dim: #6e7681;
  --yaar-accent: #58a6ff;
  --yaar-accent-hover: #79c0ff;
  --yaar-border: #30363d;
  --yaar-success: #3fb950;
  --yaar-error: #f85149;
  --yaar-warning: #d29922;
  --yaar-sp-1: 4px;
  --yaar-sp-2: 8px;
  --yaar-sp-3: 12px;
  --yaar-sp-4: 16px;
  --yaar-sp-5: 20px;
  --yaar-sp-6: 24px;
  --yaar-sp-8: 32px;
  --yaar-radius-sm: 4px;
  --yaar-radius: 6px;
  --yaar-radius-lg: 10px;

  --yaar-shadow-sm: 0 1px 2px rgba(0,0,0,.3);

  --yaar-ease: 150ms ease;
}
.y-app{display:flex;flex-direction:column;height:100%;color:var(--yaar-text);background:var(--yaar-bg);font-family:var(--yaar-font);font-size:var(--yaar-text-base);line-height:1.5}
.y-flex{display:flex}.y-flex-col{display:flex;flex-direction:column}.y-flex-center{display:flex;align-items:center;justify-content:center}.y-flex-between{display:flex;align-items:center;justify-content:space-between}.y-flex-1{flex:1;min-width:0;min-height:0}

  color-scheme: dark;
  --bg: #0f1117;
  --panel: #161a22;
  --muted: #9aa3b2;
  --text: #e7ecf3;
  --accent: #6ea8fe;
  --border: #2a3140;
  --good: #9ad08f;
}
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  font-family:
    Inter,
    system-ui,
    -apple-system,
    Segoe UI,
    Roboto,
    sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-y: auto;
}
.wrap {
  max-width: 980px;
  margin: 0 auto;
  padding: 16px;
}
.top {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
h1 {
  margin: 0;
  font-size: 20px;
}
.spacer {
  flex: 1;
}
.muted {
  color: var(--muted);
  font-size: 13px;
}
input,
button,
select {
  background: #202838;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 10px;
  font: inherit;
}
button {
  cursor: pointer;
}
button:hover {
  border-color: #3b4660;
}
input {
  min-width: 270px;
}
.recommend-btn {
  border-color: #385995;
}
.recommend-box {
  margin-top: 10px;
  margin-bottom: 10px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: #141a25;
}
.recommend-title {
  margin: 0 0 8px;
  color: var(--good);
  font-size: 14px;
}
.recommend-item {
  margin: 0 0 8px;
  font-size: 13px;
  color: #d5deea;
}
.recommend-item:last-child {
  margin-bottom: 0;
}
.recommend-item a {
  color: var(--accent);
  text-decoration: none;
}
.recommend-item a:hover {
  text-decoration: underline;
}
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.card-inner {
  display: grid;
  grid-template-columns: 170px 1fr;
  gap: 12px;
}
.thumb {
  width: 100%;
  height: 100%;
  min-height: 130px;
  object-fit: cover;
  background: #11151f;
}
.content {
  padding: 12px 14px 14px 0;
}
.title {
  margin: 0 0 8px;
  font-size: 17px;
  line-height: 1.3;
}
.title a {
  color: var(--text);
  text-decoration: none;
}
.title a:hover {
  color: var(--accent);
  text-decoration: underline;
}
.meta {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  color: var(--muted);
  font-size: 12px;
  margin-bottom: 8px;
}
.summary {
  margin: 0;
  color: #cdd6e3;
  font-size: 14px;
  line-height: 1.45;
}
.links {
  margin-top: 10px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.links a {
  color: var(--accent);
  font-size: 13px;
  text-decoration: none;
}
.links a:hover {
  text-decoration: underline;
}
.tag {
  display: inline-block;
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: 99px;
  font-size: 11px;
}
.empty {
  padding: 24px;
  text-align: center;
  border: 1px dashed var(--border);
  border-radius: 12px;
  color: var(--muted);
}
.chart-btn {
  border-color: #2d4a6b;
}
.chart-panel {
  background: var(--yaar-bg-surface, #161b22);
  border: 1px solid var(--yaar-border, #30363d);
  border-radius: 8px;
  padding: 10px 14px 14px;
  margin: 8px 0;
}
.chart-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--yaar-text, #e6edf3);
}
.chart-wrap {
  height: 160px;
  position: relative;
}
.chart-wrap canvas {
  width: 100% !important;
}
@media (max-width: 760px) {
  .card-inner {
    grid-template-columns: 1fr;
  }
  .content {
    padding: 0 12px 12px 12px;
  }
  .thumb {
    min-height: 180px;
  }
  input {
    min-width: 100%;
