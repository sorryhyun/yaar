<html lang="en">

@font-face{font-family:'NanumSquareNeo';src:url('/NanumSquareNeoOTF-Rg.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'NanumSquareNeo';src:url('/NanumSquareNeoOTF-Bd.otf') format('opentype');font-weight:700;font-style:normal;font-display:swap}

:root {
  --yaar-bg: #0f1117;
  --yaar-bg-surface: #161b22;
  --yaar-bg-surface-hover: #1c2129;
  --yaar-text: #e6edf3;
  --yaar-text-muted: #8b949e;
  --yaar-text-dim: #6e7681;
  --yaar-accent: #58a6ff;
  --yaar-accent-hover: #79c0ff;
  --yaar-border: #30363d;
  --yaar-success: #3fb950;
  --yaar-error: #f85149;
  --yaar-warning: #d29922;
  --yaar-sp-1: 4px;
  --yaar-sp-2: 8px;
  --yaar-sp-3: 12px;
  --yaar-sp-4: 16px;
  --yaar-sp-5: 20px;
  --yaar-sp-6: 24px;
  --yaar-sp-8: 32px;
  --yaar-radius-sm: 4px;
  --yaar-radius: 6px;
  --yaar-radius-lg: 10px;
  --yaar-font: 'NanumSquareNeo', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --yaar-font-mono: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Consolas, monospace;
  --yaar-text-xs: 11px;
  --yaar-text-sm: 12px;
  --yaar-text-base: 13px;
  --yaar-text-lg: 15px;
  --yaar-text-xl: 18px;
  --yaar-shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --yaar-shadow: 0 2px 8px rgba(0,0,0,.4);
  --yaar-shadow-lg: 0 8px 24px rgba(0,0,0,.5);
  --yaar-ease: 150ms ease;
}
.y-app{display:flex;flex-direction:column;height:100%;color:var(--yaar-text);background:var(--yaar-bg);font-family:var(--yaar-font);font-size:var(--yaar-text-base);line-height:1.5}
.y-flex{display:flex}.y-flex-col{display:flex;flex-direction:column}.y-flex-center{display:flex;align-items:center;justify-content:center}.y-flex-between{display:flex;align-items:center;justify-content:space-between}.y-flex-1{flex:1;min-width:0;min-height:0}
.y-gap-1{gap:var(--yaar-sp-1)}.y-gap-2{gap:var(--yaar-sp-2)}.y-gap-3{gap:var(--yaar-sp-3)}.y-gap-4{gap:var(--yaar-sp-4)}

.y-px-2{padding-left:var(--yaar-sp-2);padding-right:var(--yaar-sp-2)}.y-px-3{padding-left:var(--yaar-sp-3);padding-right:var(--yaar-sp-3)}.y-px-4{padding-left:var(--yaar-sp-4);padding-right:var(--yaar-sp-4)}
.y-py-2{padding-top:var(--yaar-sp-2);padding-bottom:var(--yaar-sp-2)}.y-py-3{padding-top:var(--yaar-sp-3);padding-bottom:var(--yaar-sp-3)}
.y-text-xs{font-size:var(--yaar-text-xs)}.y-text-sm{font-size:var(--yaar-text-sm)}.y-text-base{font-size:var(--yaar-text-base)}.y-text-lg{font-size:var(--yaar-text-lg)}.y-text-xl{font-size:var(--yaar-text-xl)}
.y-text-muted{color:var(--yaar-text-muted)}.y-text-dim{color:var(--yaar-text-dim)}.y-text-accent{color:var(--yaar-accent)}
.y-font-bold{font-weight:600}.y-font-mono{font-family:var(--yaar-font-mono)}
.y-truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.y-border{border:1px solid var(--yaar-border)}.y-border-b{border-bottom:1px solid var(--yaar-border)}.y-border-t{border-top:1px solid var(--yaar-border)}
.y-rounded{border-radius:var(--yaar-radius)}.y-rounded-lg{border-radius:var(--yaar-radius-lg)}

.y-surface{background:var(--yaar-bg-surface)}

.y-btn-sm{padding:var(--yaar-sp-1) var(--yaar-sp-2);font-size:var(--yaar-text-xs)}

.y-input:focus{border-color:var(--yaar-accent)}.y-input::placeholder{color:var(--yaar-text-dim)}

.y-badge-error{color:var(--yaar-error);border-color:var(--yaar-error);background:rgba(248,81,73,.1)}
.y-badge-warning{color:var(--yaar-warning);border-color:var(--yaar-warning);background:rgba(210,153,34,.1)}
.y-badge-accent{color:var(--yaar-accent);border-color:var(--yaar-accent);background:rgba(88,166,255,.1)}

.y-spinner{width:16px;height:16px;border:2px solid var(--yaar-border);border-top-color:var(--yaar-accent);border-radius:50%;animation:y-spin .6s linear infinite}

.y-scroll{overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--yaar-border) transparent}

.y-overflow-hidden{overflow:hidden}

body,
#app {
  height: 100%;
  margin: 0;
}

.cfg-layout {
  display: flex;
  flex-direction: column;
  height: 100%;
  background: var(--yaar-bg);
}

.cfg-tabs {
  display: flex;
  gap: 2px;
  padding: 0 var(--yaar-sp-3);
  border-bottom: 1px solid var(--yaar-border);
  background: var(--yaar-bg-surface);
  flex-shrink: 0;
}

.cfg-tab {
  padding: var(--yaar-sp-2) var(--yaar-sp-3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--yaar-text-muted);
  cursor: pointer;
  font-size: 13px;
  transition:
    color 0.15s,
    border-color 0.15s;
}

.cfg-tab:hover {
  color: var(--yaar-text);
}

.cfg-tab.active {
  color: var(--yaar-accent);
  border-bottom-color: var(--yaar-accent);
}

.cfg-content {
  flex: 1;
  min-height: 0;
  position: relative;
}

/* Settings wrapper */
.settings-wrapper {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  padding: var(--yaar-sp-4);
}

.cfg-section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--yaar-text);
  margin-bottom: var(--yaar-sp-3);
}

/* Settings tab */
.settings-editor {
  font-family: 'Consolas', 'Monaco', monospace;
  font-size: 12px;
  width: 100%;
  min-height: 300px;
  resize: vertical;
  background: var(--yaar-bg-surface);
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius);
  color: var(--yaar-text);
  padding: var(--yaar-sp-3);
  line-height: 1.6;
  box-sizing: border-box;
}

.settings-editor:focus {
  outline: none;
  border-color: var(--yaar-accent);
}

/* ── Sidebar view layout ── */
.view-panel {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
}

.view-add-section {
  padding: var(--yaar-sp-3) var(--yaar-sp-4);
  border-bottom: 1px solid var(--yaar-border);
  background: var(--yaar-bg-surface);
  flex-shrink: 0;
}

.view-add-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.view-add-form {
  margin-top: var(--yaar-sp-3);
}

.view-split {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* Sidebar */
.view-sidebar {
  width: 210px;
  border-right: 1px solid var(--yaar-border);
  overflow-y: auto;
  flex-shrink: 0;
  background: var(--yaar-bg);
}

.sidebar-empty {
  padding: var(--yaar-sp-4) var(--yaar-sp-3);
  color: var(--yaar-text-muted);
  font-size: 12px;
  text-align: center;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-2);
  padding: 10px var(--yaar-sp-3);
  cursor: pointer;
  border-bottom: 1px solid var(--yaar-border);
  border-left: 2px solid transparent;
  transition: background 0.1s;
}

.sidebar-item:hover {
  background: rgba(255, 255, 255, 0.03);
}

.sidebar-item.active {
  background: rgba(88, 166, 255, 0.08);
  border-left-color: var(--yaar-accent);
}

.sidebar-item-icon {
  font-size: 16px;
  width: 20px;
  text-align: center;
  flex-shrink: 0;
}

.sidebar-item-label {
  font-size: 13px;
  color: var(--yaar-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}

.sidebar-item-sub {
  font-size: 10px;
  color: var(--yaar-text-muted);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Detail panel */
.view-detail {
  flex: 1;
  overflow-y: auto;
  padding: var(--yaar-sp-4);
}

.detail-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--yaar-text-muted);
  font-size: 13px;
  flex-direction: column;
  gap: var(--yaar-sp-2);
}

.detail-empty-icon {
  font-size: 32px;
  opacity: 0.3;
}

.detail-card {
  background: var(--yaar-bg-surface);
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius);
  padding: var(--yaar-sp-4);
}

.detail-header {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-3);
  margin-bottom: var(--yaar-sp-4);
  padding-bottom: var(--yaar-sp-3);
  border-bottom: 1px solid var(--yaar-border);
}

.detail-big-icon {
  font-size: 28px;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--yaar-bg);
  border-radius: var(--yaar-radius);
  border: 1px solid var(--yaar-border);
  flex-shrink: 0;
}

.detail-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--yaar-text);
}

.detail-title-sub {
  font-size: 11px;
  color: var(--yaar-text-muted);
  margin-top: 2px;
}

.detail-field {
  margin-bottom: var(--yaar-sp-3);
}

.detail-field-label {
  font-size: 10px;
  color: var(--yaar-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
  font-weight: 600;
}

.detail-field-value {
  font-size: 13px;
  color: var(--yaar-text);
  word-break: break-all;
  background: var(--yaar-bg);
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius);
  padding: 6px 10px;
  font-family: 'Consolas', 'Monaco', monospace;
}

.detail-actions {
  margin-top: var(--yaar-sp-4);
  padding-top: var(--yaar-sp-3);
  border-top: 1px solid var(--yaar-border);
  display: flex;
  gap: var(--yaar-sp-2);
}

/* Shared form styles */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--yaar-sp-2);
  margin-bottom: var(--yaar-sp-3);
}

.form-full {
  grid-column: 1 / -1;
}

.field-label {
  font-size: 11px;
  color: var(--yaar-text-muted);
  margin-bottom: 4px;
}

/* Badges */
.item-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 10px;
  background: var(--yaar-bg);
  border: 1px solid var(--yaar-border);
  color: var(--yaar-text-muted);
  white-space: nowrap;
  flex-shrink: 0;
  display: inline-block;
}
.item-badge-event {
  background: rgba(88, 166, 255, 0.1);
  border-color: rgba(88, 166, 255, 0.3);
  color: var(--yaar-accent);
}
.item-badge-enabled {
  background: rgba(63, 185, 80, 0.1);
  border-color: rgba(63, 185, 80, 0.3);
  color: var(--yaar-success);
}
.item-badge-disabled {
  background: var(--yaar-bg);
  border-color: var(--yaar-border);
  color: var(--yaar-text-muted);
}

/* Toast */
.cfg-toast {
  position: fixed;
  bottom: var(--yaar-sp-4);
  right: var(--yaar-sp-4);
  padding: var(--yaar-sp-2) var(--yaar-sp-3);
  border-radius: var(--yaar-radius);
  font-size: 13px;
  z-index: 1000;
  pointer-events: none;
  animation: fadeIn 0.2s ease;
}

.cfg-toast-success {
  background: var(--yaar-success);
  color: #000;
}
.cfg-toast-error {
  background: var(--yaar-error);
  color: #fff;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ── Typed Settings UI ── */
.s-section {
  background: var(--yaar-bg-surface);
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius);
  padding: var(--yaar-sp-3) var(--yaar-sp-4);
  margin-bottom: var(--yaar-sp-3);
}

.s-section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--yaar-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: var(--yaar-sp-3);
  padding-bottom: var(--yaar-sp-2);
  border-bottom: 1px solid var(--yaar-border);
}

.s-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  gap: var(--yaar-sp-3);
}

.s-row:last-child {
  border-bottom: none;
  padding-bottom: 0;
}

.s-row:first-of-type {
  padding-top: 0;
}

.s-row-toggle {
  align-items: center;
}

.s-label {
  font-size: 13px;
  color: var(--yaar-text);
  flex: 1;
  display: flex;
  align-items: center;
  gap: 6px;
}

.s-hint {
  font-size: 10px;
  color: var(--yaar-text-muted);
  font-weight: 400;
}

.s-hint-block {
  font-size: 11px;
  color: var(--yaar-text-muted);
  margin-top: 2px;
}

.s-input {
  font-size: 13px;
  background: var(--yaar-bg);
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius);
  color: var(--yaar-text);
  padding: 5px 10px;
  width: 180px;
  box-sizing: border-box;
  transition: border-color 0.15s;
}

.s-input:focus {
  outline: none;
  border-color: var(--yaar-accent);
}

.s-select {
  font-size: 13px;
  background: var(--yaar-bg);
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius);
  color: var(--yaar-text);
  padding: 5px 10px;
  width: 180px;
  cursor: pointer;
  transition: border-color 0.15s;
}

.s-select:focus {
  outline: none;
  border-color: var(--yaar-accent);
}

/* Toggle switch */
.s-toggle {
  width: 40px;
  height: 22px;
  border-radius: 11px;
  background: var(--yaar-border);
  border: none;
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
  padding: 0;
}

.s-toggle.on {
  background: var(--yaar-accent);
}

.s-toggle-thumb {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #fff;
  transition: transform 0.2s;
  display: block;
}

.s-toggle.on .s-toggle-thumb {
  transform: translateX(18px);
}

/* Accent color swatches */
.s-accent-picker {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.s-accent-swatch {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition:
    transform 0.1s,
    border-color 0.1s;
}

.s-accent-swatch:hover {
  transform: scale(1.15);
}

.s-accent-swatch.active {
  border-color: var(--yaar-text);
  transform: scale(1.1);
}

/* Extra/advanced section */
.s-extra-toggle {
  background: none;
  border: none;
  color: var(--yaar-text-muted);
  font-size: 12px;
  cursor: pointer;
  padding: 4px 0;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.15s;
}

.s-extra-toggle:hover {
  color: var(--yaar-text);
}

.s-extra-badge {
  background: var(--yaar-bg-surface);
  border: 1px solid var(--yaar-border);
  border-radius: 10px;
  padding: 1px 7px;
  font-size: 10px;
  color: var(--yaar-text-muted);
}

/* Domains view */
.domain-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.domain-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  background: var(--yaar-bg);
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius);
  gap: 8px;
}

.domain-name {
  font-size: 13px;
  color: var(--yaar-text);
  font-family: 'Consolas', 'Monaco', monospace;
  word-break: break-all;
  flex: 1;
}

.domain-del {
  color: var(--yaar-text-muted);
  flex-shrink: 0;
  font-size: 12px;
  padding: 2px 6px;
}

.domain-del:hover {
  color: var(--yaar-error);
