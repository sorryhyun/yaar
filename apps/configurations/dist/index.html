:root {
  --yaar-bg: #0f1117;
  --yaar-bg-surface: #161b22;
  --yaar-bg-surface-hover: #1c2129;
  --yaar-text: #e6edf3;
  --yaar-text-muted: #8b949e;
  --yaar-text-dim: #6e7681;
  --yaar-accent: #58a6ff;
  --yaar-accent-hover: #79c0ff;
  --yaar-border: #30363d;
  --yaar-success: #3fb950;
  --yaar-error: #f85149;
  --yaar-warning: #d29922;
  --yaar-sp-1: 4px;
  --yaar-sp-2: 8px;
  --yaar-sp-3: 12px;
  --yaar-sp-4: 16px;
  --yaar-sp-8: 32px;
  --yaar-radius: 6px;
  --yaar-radius-lg: 10px;
  --yaar-font: 'NanumSquareNeo', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --yaar-font-mono: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Consolas, monospace;
  --yaar-text-xs: 11px;
  --yaar-text-sm: 12px;
  --yaar-text-base: 13px;
  --yaar-text-lg: 15px;
  --yaar-text-xl: 18px;
  --yaar-shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --yaar-shadow: 0 2px 8px rgba(0,0,0,.4);
  --yaar-shadow-lg: 0 8px 24px rgba(0,0,0,.5);
  --yaar-ease: 150ms ease;
}

.y-btn-sm{padding:var(--yaar-sp-1) var(--yaar-sp-2);font-size:var(--yaar-text-xs)}
.y-input{width:100%;padding:var(--yaar-sp-2) var(--yaar-sp-3);border:1px solid var(--yaar-border);border-radius:var(--yaar-radius);background:var(--yaar-bg);color:var(--yaar-text);font-size:var(--yaar-text-sm);outline:none;transition:border-color var(--yaar-ease)}

.y-badge-warning{color:var(--yaar-warning);border-color:var(--yaar-warning);background:rgba(210,153,34,.1)}
.y-badge-accent{color:var(--yaar-accent);border-color:var(--yaar-accent);background:rgba(88,166,255,.1)}
@keyframes y-spin{to{transform:rotate(360deg)}}
.y-spinner{width:16px;height:16px;border:2px solid var(--yaar-border);border-top-color:var(--yaar-accent);border-radius:50%;animation:y-spin .6s linear infinite}
.y-spinner-lg{width:24px;height:24px}

body,
#app {
  height: 100%;
  margin: 0;
}

.cfg-layout {
  display: flex;
  flex-direction: column;
  height: 100%;
  background: var(--yaar-bg);
}

.cfg-tabs {
  display: flex;
  gap: 2px;
  padding: 0 var(--yaar-sp-3);
  border-bottom: 1px solid var(--yaar-border);
  background: var(--yaar-bg-surface);
  flex-shrink: 0;
}

.cfg-tab {
  padding: var(--yaar-sp-2) var(--yaar-sp-3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--yaar-text-muted);
  cursor: pointer;
  font-size: 13px;
  transition:
    color 0.15s,
    border-color 0.15s;
}

.cfg-tab:hover {
  color: var(--yaar-text);
}

.cfg-tab.active {
  color: var(--yaar-accent);
  border-bottom-color: var(--yaar-accent);
}

.cfg-content {
  flex: 1;
  min-height: 0;
  position: relative;
}

/* Settings wrapper */
.settings-wrapper {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  padding: var(--yaar-sp-4);
}

/* Settings tab */
.settings-editor {
  font-family: 'Consolas', 'Monaco', monospace;
  font-size: 12px;
  width: 100%;
  min-height: 300px;
  resize: vertical;
  background: var(--yaar-bg-surface);
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius);
  color: var(--yaar-text);
  padding: var(--yaar-sp-3);
  line-height: 1.6;
  box-sizing: border-box;
}

.settings-editor:focus {
  outline: none;
  border-color: var(--yaar-accent);
}

/* ── Sidebar view layout ── */
.view-panel {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
}

.view-add-section {
  padding: var(--yaar-sp-3) var(--yaar-sp-4);
  border-bottom: 1px solid var(--yaar-border);
  background: var(--yaar-bg-surface);
  flex-shrink: 0;
}

.view-add-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.view-add-form {
  margin-top: var(--yaar-sp-3);
}

.view-split {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* Sidebar */
.view-sidebar {
  width: 210px;
  border-right: 1px solid var(--yaar-border);
  overflow-y: auto;
  flex-shrink: 0;
  background: var(--yaar-bg);
}

.sidebar-empty {
  padding: var(--yaar-sp-4) var(--yaar-sp-3);
  color: var(--yaar-text-muted);
  font-size: 12px;
  text-align: center;
}

.sidebar-item {
  padding: 10px var(--yaar-sp-3);
  border-bottom: 1px solid var(--yaar-border);
}

.sidebar-item-icon {
  font-size: 16px;
  width: 20px;
  text-align: center;
  flex-shrink: 0;
}

.sidebar-item-label {
  font-size: 13px;
  color: var(--yaar-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}

.sidebar-item-sub {
  font-size: 10px;
  color: var(--yaar-text-muted);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Detail panel */
.view-detail {
  flex: 1;
  overflow-y: auto;
  padding: var(--yaar-sp-4);
}

.detail-empty {
  height: 100%;
  font-size: 13px;
}

.detail-empty-icon {
  font-size: 32px;
}

.detail-card {
  background: var(--yaar-bg-surface);
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius);
  padding: var(--yaar-sp-4);
}

.detail-header {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-3);
  margin-bottom: var(--yaar-sp-4);
  padding-bottom: var(--yaar-sp-3);
  border-bottom: 1px solid var(--yaar-border);
}

.detail-big-icon {
  font-size: 28px;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--yaar-bg);
  border-radius: var(--yaar-radius);
  border: 1px solid var(--yaar-border);
  flex-shrink: 0;
}

.detail-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--yaar-text);
}

.detail-title-sub {
  font-size: 11px;
  color: var(--yaar-text-muted);
  margin-top: 2px;
}

.detail-field {
  margin-bottom: var(--yaar-sp-3);
}

.detail-field-label {
  font-size: 10px;
  margin-bottom: 4px;
}

.detail-field-value {
  font-size: 13px;
  color: var(--yaar-text);
  word-break: break-all;
  background: var(--yaar-bg);
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius);
  padding: 6px 10px;
  font-family: 'Consolas', 'Monaco', monospace;
}

.detail-actions {
  margin-top: var(--yaar-sp-4);
  padding-top: var(--yaar-sp-3);
  border-top: 1px solid var(--yaar-border);
  display: flex;
  gap: var(--yaar-sp-2);
}

/* Shared form styles */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--yaar-sp-2);
  margin-bottom: var(--yaar-sp-3);
}

.form-full {
  grid-column: 1 / -1;
}

.field-label {
  font-size: 11px;
  color: var(--yaar-text-muted);
  margin-bottom: 4px;
}

/* Badges */
.item-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 10px;
  background: var(--yaar-bg);
  border: 1px solid var(--yaar-border);
  color: var(--yaar-text-muted);
  white-space: nowrap;
  flex-shrink: 0;
  display: inline-block;
}
.item-badge-event {
  background: rgba(88, 166, 255, 0.1);
  border-color: rgba(88, 166, 255, 0.3);
  color: var(--yaar-accent);
}
.item-badge-enabled {
  background: rgba(63, 185, 80, 0.1);
  border-color: rgba(63, 185, 80, 0.3);
  color: var(--yaar-success);
}
.item-badge-disabled {
  background: var(--yaar-bg);
  border-color: var(--yaar-border);
  color: var(--yaar-text-muted);
}

/* ── Typed Settings UI ── */
.s-section {
  background: var(--yaar-bg-surface);
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius);
  padding: var(--yaar-sp-3) var(--yaar-sp-4);
  margin-bottom: var(--yaar-sp-3);
}

.s-section-title {
  font-size: 12px;
  margin-bottom: var(--yaar-sp-3);
  padding-bottom: var(--yaar-sp-2);
  border-bottom: 1px solid var(--yaar-border);
}

.s-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  gap: var(--yaar-sp-3);
}

.s-row:last-child {
  border-bottom: none;
  padding-bottom: 0;
}

.s-row:first-of-type {
  padding-top: 0;
}

.s-row-toggle {
  align-items: center;
}

.s-label {
  font-size: 13px;
  color: var(--yaar-text);
  flex: 1;
  display: flex;
  align-items: center;
  gap: 6px;
}

.s-hint {
  font-size: 10px;
  color: var(--yaar-text-muted);
  font-weight: 400;
}

.s-hint-block {
  font-size: 11px;
  color: var(--yaar-text-muted);
  margin-top: 2px;
}

/* Consolidated input/select styles */
.s-input,
.s-select {
  font-size: 13px;
  background: var(--yaar-bg);
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius);
  color: var(--yaar-text);
  padding: 5px 10px;
  width: 180px;
  box-sizing: border-box;
  transition: border-color 0.15s;
}

.s-select {
  cursor: pointer;
}

.s-input:focus,
.s-select:focus {
  outline: none;
  border-color: var(--yaar-accent);
}

/* Toggle switch */
.s-toggle {
  width: 40px;
  height: 22px;
  border-radius: 11px;
  background: var(--yaar-border);
  border: none;
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
  padding: 0;
}

.s-toggle.on {
  background: var(--yaar-accent);
}

.s-toggle-thumb {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #fff;
  transition: transform 0.2s;
  display: block;
}

.s-toggle.on .s-toggle-thumb {
  transform: translateX(18px);
}

/* Accent color swatches */
.s-accent-picker {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.s-accent-swatch {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition:
    transform 0.1s,
    border-color 0.1s;
}

.s-accent-swatch:hover {
  transform: scale(1.15);
}

.s-accent-swatch.active {
  border-color: var(--yaar-text);
  transform: scale(1.1);
}

/* Extra/advanced section */
.s-extra-toggle {
  background: none;
  border: none;
  color: var(--yaar-text-muted);
  font-size: 12px;
  cursor: pointer;
  padding: 4px 0;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.15s;
}

.s-extra-toggle:hover {
  color: var(--yaar-text);
}

.s-extra-badge {
  background: var(--yaar-bg-surface);
  border: 1px solid var(--yaar-border);
  border-radius: 10px;
  padding: 1px 7px;
  font-size: 10px;
  color: var(--yaar-text-muted);
}

/* Domains view */
.domain-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.domain-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  background: var(--yaar-bg);
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius);
  gap: 8px;
}

.domain-name {
  font-size: 13px;
  color: var(--yaar-text);
  font-family: 'Consolas', 'Monaco', monospace;
  word-break: break-all;
  flex: 1;
}

.domain-del {
  color: var(--yaar-text-muted);
  flex-shrink: 0;
  font-size: 12px;
  padding: 2px 6px;
}

.domain-del:hover {
  color: var(--yaar-error);
  border-color: var(--yaar-error);
}
