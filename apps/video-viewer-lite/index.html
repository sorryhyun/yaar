:root {

  --yaar-bg-surface-hover: #1c2129;
  --yaar-text: #e6edf3;

  --yaar-text-dim: #6e7681;

  --yaar-accent-hover: #79c0ff;
  --yaar-border: #30363d;
  --yaar-success: #3fb950;
  --yaar-error: #f85149;
  --yaar-warning: #d29922;
  --yaar-sp-1: 4px;
  --yaar-sp-2: 8px;
  --yaar-sp-3: 12px;
  --yaar-sp-4: 16px;
  --yaar-sp-5: 20px;
  --yaar-sp-6: 24px;
  --yaar-sp-8: 32px;
  --yaar-radius-sm: 4px;

}
.y-app{display:flex;flex-direction:column;height:100%;color:var(--yaar-text);background:var(--yaar-bg);font-family:var(--yaar-font);font-size:var(--yaar-text-base);line-height:1.5}

.controls {

video { display: block; width: 100%; max-height: min(62vh, 560px); background: #000; }
iframe { display: block; width: 100%; aspect-ratio: 16 / 9; border: 0; background: #000; }

.is-hidden { display: none; }

@media (max-width: 720px) {
