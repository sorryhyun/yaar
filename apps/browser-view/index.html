      border-color: transparent;
      background: #3e3e3e;
      color: #ccc;

      height: 28px;

      color: #ddd;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
    }

    .url-bar .reload-btn:hover,
    .url-bar .nav-btn:hover {
      background: #4a4a4a;
    }

    .url-bar .reload-btn:active,
    .url-bar .nav-btn:active {
      transform: scale(0.97);
    }

    .url-bar .title-text {
      font-size: 11px;
      color: #888;
      flex-shrink: 0;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

      position: relative;
      overflow: auto;
      background: #1a1a1a;
      cursor: default;

      width: 100%;
      height: auto;

      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
      font-size: 14px;

      top: 0;
      left: 0;
      height: 2px;
      background: #4fc3f7;

      display: none;

      display: block;
    }
