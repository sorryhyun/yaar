:root {

  --yaar-sp-1: 4px;

  --yaar-sp-3: 12px;
  --yaar-sp-4: 16px;
  --yaar-sp-5: 20px;
  --yaar-sp-6: 24px;
  --yaar-sp-8: 32px;
  --yaar-radius-sm: 4px;

}
.y-app{display:flex;flex-direction:column;height:100%;color:var(--yaar-text);background:var(--yaar-bg);font-family:var(--yaar-font);font-size:var(--yaar-text-base);line-height:1.5}
.y-flex{display:flex}.y-flex-col{display:flex;flex-direction:column}.y-flex-center{display:flex;align-items:center;justify-content:center}.y-flex-between{display:flex;align-items:center;justify-content:space-between}.y-flex-1{flex:1;min-width:0;min-height:0}

html,

#app {
  margin: 0;
  padding: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #87ceeb;
  font-family: system-ui, sans-serif;
}

.ui-hud {
  position: fixed;
  top: 10px;
  left: 10px;
  color: white;
  background: rgba(0, 0, 0, 0.45);
  padding: 8px 10px;
  font-size: 13px;
  border-radius: 8px;
  z-index: 20;
  white-space: pre-line;
  max-width: min(360px, 90vw);
  pointer-events: none;
}

.ui-center {
  position: fixed;
  left: 50%;
  top: 50%;
  width: 14px;
  height: 14px;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 20;
  color: #fff;
  font-size: 20px;
  line-height: 1;
}

  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  background: rgba(0, 0, 0, 0.45);
  padding: 6px 10px;
  font-size: 12px;
  border-radius: 8px;
  z-index: 20;
  max-width: min(900px, 92vw);
  text-align: center;
  pointer-events: none;
}

.ui-hotbar {
  position: fixed;
  left: 50%;
  bottom: 14px;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  z-index: 20;
  max-width: 96vw;
  flex-wrap: wrap;
  justify-content: center;
}

.ui-panel {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 420px;
  max-width: 92vw;
  max-height: 80vh;
  overflow: auto;
  background: rgba(20, 20, 20, 0.92);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 12px;
  padding: 12px;
  color: #fff;
  z-index: 30;
  display: none;
