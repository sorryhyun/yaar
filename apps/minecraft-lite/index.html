html,
body,
#app {
  margin: 0;
  padding: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #87ceeb;
  font-family: system-ui, sans-serif;
}

  position: fixed;
  top: 10px;
  left: 10px;
  color: white;
  background: rgba(0, 0, 0, 0.45);
  padding: 8px 10px;
  font-size: 13px;
  border-radius: 8px;
  z-index: 20;
  white-space: pre-line;

  position: fixed;
  left: 50%;
  top: 50%;
  width: 14px;
  height: 14px;
  transform: translate(-50%, -50%);

  z-index: 20;

  bottom: 80px;

  left: 50%;
  bottom: 14px;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  z-index: 20;
  max-width: 96vw;
  flex-wrap: wrap;
  justify-content: center;
}

.ui-panel {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 420px;
  max-width: 92vw;
  max-height: 80vh;
  overflow: auto;
  background: rgba(20, 20, 20, 0.92);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 12px;
  padding: 12px;
  color: #fff;
  z-index: 30;
  display: none;
