  --yaar-accent: #58a6ff;

  --yaar-border: #30363d;
  --yaar-success: #3fb950;
  --yaar-error: #f85149;
  --yaar-warning: #d29922;
  --yaar-sp-1: 4px;
  --yaar-sp-2: 8px;
  --yaar-sp-3: 12px;
  --yaar-sp-4: 16px;

  --yaar-sp-6: 24px;

html,
body {
  height: 100%;
  margin: 0;
  overflow: hidden;
  font-family: var(--yaar-font);
  color: var(--yaar-text);
  color-scheme: light;
  background: var(--yaar-bg);
}
* {
  box-sizing: border-box;
}

/* ── Root layout ── */
.editor-root {
  display: flex;
  height: 100%;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--yaar-bg-surface);
  border-right: 1.5px solid var(--yaar-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-mode-toggle {
  display: flex;
  flex-shrink: 0;
  border-bottom: 1.5px solid var(--yaar-border);
}

.sidebar-mode-toggle button {
  flex: 1;
  padding: 13px 8px;
  border: none;
  border-radius: 0;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  background: var(--yaar-bg-surface-hover);
  color: var(--yaar-text-muted);
  transition:
    background 0.2s,
    color 0.2s,
    transform 0.1s;
}

.sidebar-mode-toggle button.active {
  background: var(--yaar-accent);
  color: #fff;
}

.sidebar-mode-toggle button:hover:not(.active) {
  background: var(--yaar-bg-surface-hover);
}

.sidebar-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px 10px 16px;
}

.sb-title {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--yaar-text-muted);
  margin: 12px 0 5px;
}

.sb-title:first-child {
  margin-top: 0;
}

.sb-divider {
  border: none;
  border-top: 1px solid var(--yaar-border);
  margin: 10px 0;
}

/* Sidebar inputs */
.sb-input {
  width: 100%;
  padding: 7px 9px;
  border: 1px solid var(--yaar-border);
  border-radius: 7px;
  font-size: 12px;
  background: var(--yaar-bg-surface);
  color: var(--yaar-text);
  outline: none;
}

.sb-input:focus {
  border-color: var(--yaar-accent);
  box-shadow: 0 0 0 2px rgba(9, 105, 218, 0.18);
}

.sb-row {
  display: flex;
  gap: 6px;
  align-items: center;
}

.sb-btn {
  padding: 7px 10px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--yaar-border);
  border-radius: 7px;
  background: var(--yaar-bg-surface-hover);
  color: var(--yaar-text);
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.12s;
}

.sb-btn:hover {
  background: var(--yaar-bg-surface-hover);
}
.sb-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.sb-btn.icon {
  padding: 7px 11px;
  font-size: 15px;
}

/* File browser */
.storage-status {
  font-size: 11px;
  color: var(--yaar-text-muted);
  min-height: 15px;
  margin: 5px 0 3px;
}

.storage-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin-top: 4px;
}

.storage-item {
  display: flex;
  flex-direction: column;
  padding: 7px 9px;
  border-radius: 7px;
  border: 1px solid transparent;
  background: transparent;
  cursor: pointer;
  text-align: left;
  width: 100%;
  transition:
    background 0.1s,
    border-color 0.1s;
}

.storage-item:hover {
  background: var(--yaar-bg-surface-hover);
  border-color: var(--yaar-accent);
}

.storage-item.active {
  background: var(--ve-selected);
  border-color: var(--yaar-accent);
}

.file-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--yaar-text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.file-dir {
  font-size: 10px;
  color: var(--yaar-text-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-top: 2px;
}

.storage-empty {
  font-size: 12px;
  color: var(--yaar-text-muted);
  padding: 10px 4px;
  text-align: center;
}

.storage-hint {
  font-size: 10px;
  color: var(--yaar-text-muted);
  margin-top: 6px;
}

/* Composition settings grid */
.comp-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.comp-grid label {
  font-size: 10px;
  font-weight: 700;
  color: var(--yaar-text-muted);
  display: block;
  margin-bottom: 2px;
}

.comp-grid .sb-input {
  padding: 5px 7px;
}

/* Scene list in sidebar */
.scene-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.scene-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 8px;
  border-radius: 7px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid transparent;
  background: var(--yaar-bg-surface);
}

.scene-item:hover {
  background: var(--yaar-bg-surface-hover);
}

.scene-item.selected {
  background: var(--ve-selected);
  border-color: var(--yaar-accent);
}

.scene-item .scene-color {
  width: 10px;
  height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}

.scene-item .scene-info {
  flex: 1;
  min-width: 0;
}

.scene-item .scene-name {
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.scene-item .scene-range {
  font-size: 10px;
  color: var(--yaar-text-muted);
  margin-top: 1px;
}

.scene-item .scene-delete {
  padding: 2px 7px;
  font-size: 11px;
  border-radius: 4px;
  flex-shrink: 0;
  background: transparent;
  border: 1px solid var(--yaar-border);
  cursor: pointer;
}

.scene-item .scene-delete:hover {
  background: rgba(207, 34, 46, 0.1);
  border-color: var(--yaar-error);
}

/* ── Main content ── */
.editor-main {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-width: 0;
}

.panel {
  background: var(--yaar-bg-surface);
  border-radius: 12px;
  border: 1px solid var(--yaar-border);
  padding: 14px;
}

.panel-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--yaar-text);
  margin-bottom: 11px;
}

/* Video */
.video-wrap {
  border-radius: 10px;
  overflow: hidden;
  background: #0d1014;
  min-height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
}

video {
  width: 100%;
  max-height: 400px;
  background: #111;
  display: block;
}

/* Trim controls */
.trim-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.trim-grid label,
.field-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--yaar-text);
  display: block;
  margin-bottom: 3px;
}

input[type='number'],
select {
  width: 100%;
  padding: 7px 9px;
  border: 1px solid var(--yaar-border);
  border-radius: 7px;
  font-size: 13px;
  background: var(--yaar-bg-surface);
  color: var(--yaar-text);
  outline: none;
}

input[type='number']:focus,
select:focus {
  border-color: var(--yaar-accent);
}

input[type='range'] {
  width: 100%;
  margin-top: 5px;
  accent-color: var(--yaar-accent);
}

.action-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-wrap: wrap;
  margin-top: 10px;
}

.action-row button,
.action-row select {
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid var(--yaar-border);
  border-radius: 7px;
  background: var(--yaar-bg-surface-hover);
  color: var(--yaar-text);
  cursor: pointer;
  transition: background 0.12s;
  width: auto;
}

.action-row button:hover {
  background: var(--yaar-bg-surface-hover);
}
.action-row button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.action-row .grow {
  flex: 1;
  min-width: 140px;
}

.stats-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.chip {
  padding: 6px 12px;
  border-radius: 999px;
  background: var(--yaar-bg-surface-hover);
  border: 1px solid var(--yaar-border);
  font-size: 13px;
  font-weight: 600;
}

.status-text {
  font-size: 12px;
  color: var(--yaar-text);
  min-height: 16px;
  margin-top: 6px;
}

.shortcuts-text {
  font-size: 11px;
  color: var(--yaar-text-muted);
  margin-top: 8px;
  line-height: 1.5;
}

.error-text {
  color: var(--yaar-error);
  font-size: 13px;
  min-height: 16px;
  margin-top: 4px;
}

progress {
  width: 100%;
  height: 8px;
  border-radius: 4px;
  border: none;
  margin-top: 6px;
  accent-color: var(--yaar-accent);
}

/* Canvas */
.canvas-wrap {
  border-radius: 10px;
  overflow: hidden;
  background: #0d1014;
  display: flex;
  align-items: center;
  justify-content: center;
}

.canvas-wrap canvas {
  width: 100%;
  max-height: 380px;
  background: #111;
}

/* Timeline */
.timeline-track {
  position: relative;
  height: 40px;
  background: #1a2733;
  border-radius: 6px;
  overflow: hidden;
}

.timeline-block {
  position: absolute;
  top: 2px;
  bottom: 2px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 6px;
  cursor: pointer;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  min-width: 4px;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.timeline-block.selected {
  border: 2px solid #fff;
}

.timeline-playhead {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--yaar-error);
  pointer-events: none;
  z-index: 10;
  transition: left 34ms linear;
}

/* Scene properties panel */
.scene-props-panel {
  margin-top: 6px;
  border-top: 1px solid var(--yaar-border);
  padding-top: 4px;
}

.props-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
  margin-top: 4px;
}

.props-field {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.props-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--yaar-text-muted);
  display: block;
}

.props-field .sb-input {
  padding: 5px 6px;
  font-size: 11px;
}

.props-field input[type='color'] {
  padding: 2px 4px;
  height: 30px;
  cursor: pointer;
}

@media (max-width: 580px) {
  .sidebar {
    width: 200px;
  }
  .trim-grid {
    grid-template-columns: 1fr;
  }
  .comp-grid {
    grid-template-columns: 1fr;
  }
  .props-grid {
    grid-template-columns: 1fr;
  }
}

.sidebar-mode-toggle button:active {
  transform: scale(0.96);
}

.scene-item {
  transition:
    background 0.15s,
    border-color 0.15s,
    transform 0.1s;
}

.scene-item.selected {
  animation: scene-select-flash 0.3s ease-out;
}

@keyframes scene-select-flash {
  0% {
    background: #c8e2ef;
  }
  40% {
    background: #a8d0e8;
  }
  100% {
    background: #d8eaf3;
  }
}

.timeline-block {
  transition:
    left 0.1s ease-out,
    width 0.1s ease-out,
    border-color 0.1s;
}

/* ── Layer list in sidebar ── */
.layer-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin-bottom: 2px;
}

.layer-group-item {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 5px 7px;
  border-radius: 7px;
  border: 1px solid transparent;
  background: var(--yaar-bg-surface);
  cursor: pointer;
  transition:
    background 0.12s,
    border-color 0.12s;
}

.layer-group-item:hover {
  background: var(--yaar-bg-surface-hover);
}

.layer-group-item.selected {
  background: var(--ve-selected);
  border-color: var(--yaar-accent);
}

.layer-name {
  flex: 1;
  font-size: 12px;
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--yaar-text);
  cursor: pointer;
}

.layer-icon-btn {
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 13px;
  padding: 1px 3px;
  border-radius: 4px;
  line-height: 1;
  transition: background 0.1s;
}

.layer-icon-btn:hover {
  background: rgba(0, 0, 0, 0.08);
}

.layer-icon-btn.layer-delete:hover {
  background: rgba(207, 34, 46, 0.1);
}

/* ── Timeline multi-row ── */
.timeline-track {
  position: relative;
  background: #1a2733;
  border-radius: 6px;
  overflow: hidden;
  min-height: 40px;
}

.tl-playhead-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  pointer-events: none;
  z-index: 10;
}

.tl-layer-row {
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid rgba(255, 255, 255, 0.07);
  min-height: 36px;
}

.tl-layer-row:last-child {
  border-bottom: none;
}

.tl-layer-row.selected .tl-layer-label {
  background: rgba(85, 153, 184, 0.25);
  color: #9dd3ee;
}

.tl-layer-row.hidden-layer .tl-layer-area {
  opacity: 0.4;
}

.tl-layer-label {
  width: 72px;
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 700;
  color: #7fa8be;
  padding: 4px 6px;
  display: flex;
  align-items: center;
  background: rgba(0, 0, 0, 0.2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: pointer;
  border-right: 1px solid rgba(255, 255, 255, 0.07);
  transition:
    background 0.12s,
    color 0.12s;
}

.tl-layer-label:hover {
  background: rgba(85, 153, 184, 0.15);
}

.tl-layer-area {
  flex: 1;
  position: relative;
  min-width: 0;
}

/* ── Scene list layer grouping ── */
.scene-layer-header {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 6px;
  margin-top: 6px;
  border-radius: 5px;
  background: var(--yaar-bg-surface-hover);
  border: 1px solid var(--yaar-border);
  font-size: 10px;
  cursor: pointer;
}

.scene-layer-header:first-child {
  margin-top: 0;
}

.scene-layer-header.active-layer {
  background: var(--ve-selected);
  border-color: var(--yaar-accent);
}

.scene-layer-vis {
  font-size: 12px;
  cursor: pointer;
  padding: 1px 2px;
  border-radius: 3px;
  transition: background 0.1s;
}

.scene-layer-vis:hover {
  background: rgba(0, 0, 0, 0.08);
}

.scene-layer-name {
  flex: 1;
  font-weight: 700;
  color: var(--yaar-text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: pointer;
}

.scene-layer-count {
  color: var(--yaar-text-muted);
  font-size: 10px;
  flex-shrink: 0;
}

.scene-item.locked {
  opacity: 0.7;
}

.scene-item.locked .scene-delete {
  opacity: 0.4;
  cursor: not-allowed;
}
