<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

@font-face{font-family:'NanumSquareNeo';src:url('/NanumSquareNeoOTF-Rg.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'NanumSquareNeo';src:url('/NanumSquareNeoOTF-Bd.otf') format('opentype');font-weight:700;font-style:normal;font-display:swap}

:root {
  --yaar-bg: #0f1117;
  --yaar-bg-surface: #161b22;
  --yaar-bg-surface-hover: #1c2129;
  --yaar-text: #e6edf3;
  --yaar-text-muted: #8b949e;
  --yaar-text-dim: #6e7681;
  --yaar-accent: #58a6ff;
  --yaar-accent-hover: #79c0ff;
  --yaar-border: #30363d;
  --yaar-success: #3fb950;
  --yaar-error: #f85149;
  --yaar-warning: #d29922;
  --yaar-sp-1: 4px;
  --yaar-sp-2: 8px;
  --yaar-sp-3: 12px;
  --yaar-sp-4: 16px;
  --yaar-sp-5: 20px;
  --yaar-sp-6: 24px;
  --yaar-sp-8: 32px;
  --yaar-radius-sm: 4px;
  --yaar-radius: 6px;
  --yaar-radius-lg: 10px;
  --yaar-font: 'NanumSquareNeo', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --yaar-font-mono: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Consolas, monospace;
  --yaar-text-xs: 11px;
  --yaar-text-sm: 12px;
  --yaar-text-base: 13px;
  --yaar-text-lg: 15px;
  --yaar-text-xl: 18px;
  --yaar-shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --yaar-shadow: 0 2px 8px rgba(0,0,0,.4);
  --yaar-shadow-lg: 0 8px 24px rgba(0,0,0,.5);
  --yaar-ease: 150ms ease;
}
.y-app{display:flex;flex-direction:column;height:100%;color:var(--yaar-text);background:var(--yaar-bg);font-family:var(--yaar-font);font-size:var(--yaar-text-base);line-height:1.5}
.y-flex{display:flex}.y-flex-col{display:flex;flex-direction:column}.y-flex-center{display:flex;align-items:center;justify-content:center}.y-flex-between{display:flex;align-items:center;justify-content:space-between}.y-flex-1{flex:1;min-width:0;min-height:0}
.y-gap-1{gap:var(--yaar-sp-1)}.y-gap-2{gap:var(--yaar-sp-2)}.y-gap-3{gap:var(--yaar-sp-3)}.y-gap-4{gap:var(--yaar-sp-4)}
.y-grid{display:grid}
.y-p-1{padding:var(--yaar-sp-1)}.y-p-2{padding:var(--yaar-sp-2)}.y-p-3{padding:var(--yaar-sp-3)}.y-p-4{padding:var(--yaar-sp-4)}
.y-px-2{padding-left:var(--yaar-sp-2);padding-right:var(--yaar-sp-2)}.y-px-3{padding-left:var(--yaar-sp-3);padding-right:var(--yaar-sp-3)}.y-px-4{padding-left:var(--yaar-sp-4);padding-right:var(--yaar-sp-4)}
.y-py-2{padding-top:var(--yaar-sp-2);padding-bottom:var(--yaar-sp-2)}.y-py-3{padding-top:var(--yaar-sp-3);padding-bottom:var(--yaar-sp-3)}
.y-text-xs{font-size:var(--yaar-text-xs)}.y-text-sm{font-size:var(--yaar-text-sm)}.y-text-base{font-size:var(--yaar-text-base)}.y-text-lg{font-size:var(--yaar-text-lg)}.y-text-xl{font-size:var(--yaar-text-xl)}
.y-text-muted{color:var(--yaar-text-muted)}.y-text-dim{color:var(--yaar-text-dim)}.y-text-accent{color:var(--yaar-accent)}
.y-font-bold{font-weight:600}.y-font-mono{font-family:var(--yaar-font-mono)}
.y-truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.y-border{border:1px solid var(--yaar-border)}.y-border-b{border-bottom:1px solid var(--yaar-border)}.y-border-t{border-top:1px solid var(--yaar-border)}
.y-rounded{border-radius:var(--yaar-radius)}.y-rounded-lg{border-radius:var(--yaar-radius-lg)}
.y-card{background:var(--yaar-bg-surface);border:1px solid var(--yaar-border);border-radius:var(--yaar-radius);padding:var(--yaar-sp-3)}
.y-surface{background:var(--yaar-bg-surface)}
.y-btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--yaar-sp-2);padding:var(--yaar-sp-2) var(--yaar-sp-3);border:1px solid var(--yaar-border);border-radius:var(--yaar-radius);background:var(--yaar-bg-surface);color:var(--yaar-text);font-size:var(--yaar-text-sm);cursor:pointer;transition:background var(--yaar-ease),border-color var(--yaar-ease);user-select:none;white-space:nowrap}
.y-btn:hover{background:var(--yaar-bg-surface-hover)}.y-btn:active{opacity:.8}
.y-btn-primary{background:var(--yaar-accent);border-color:var(--yaar-accent);color:#fff}.y-btn-primary:hover{background:var(--yaar-accent-hover);border-color:var(--yaar-accent-hover)}
.y-btn-ghost{border-color:transparent;background:transparent}.y-btn-ghost:hover{background:var(--yaar-bg-surface)}
.y-btn-sm{padding:var(--yaar-sp-1) var(--yaar-sp-2);font-size:var(--yaar-text-xs)}
.y-input{width:100%;padding:var(--yaar-sp-2) var(--yaar-sp-3);border:1px solid var(--yaar-border);border-radius:var(--yaar-radius);background:var(--yaar-bg);color:var(--yaar-text);font-size:var(--yaar-text-sm);outline:none;transition:border-color var(--yaar-ease)}
.y-input:focus{border-color:var(--yaar-accent)}.y-input::placeholder{color:var(--yaar-text-dim)}
.y-badge{display:inline-flex;align-items:center;padding:1px var(--yaar-sp-2);border-radius:10px;font-size:var(--yaar-text-xs);font-weight:500;background:var(--yaar-bg-surface);border:1px solid var(--yaar-border)}
.y-badge-success{color:var(--yaar-success);border-color:var(--yaar-success);background:rgba(63,185,80,.1)}
.y-badge-error{color:var(--yaar-error);border-color:var(--yaar-error);background:rgba(248,81,73,.1)}
.y-badge-warning{color:var(--yaar-warning);border-color:var(--yaar-warning);background:rgba(210,153,34,.1)}
.y-badge-accent{color:var(--yaar-accent);border-color:var(--yaar-accent);background:rgba(88,166,255,.1)}
@keyframes y-spin{to{transform:rotate(360deg)}}
.y-spinner{width:16px;height:16px;border:2px solid var(--yaar-border);border-top-color:var(--yaar-accent);border-radius:50%;animation:y-spin .6s linear infinite}
.y-spinner-lg{width:24px;height:24px}
.y-scroll{overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--yaar-border) transparent}
.y-scroll::-webkit-scrollbar{width:6px}.y-scroll::-webkit-scrollbar-track{background:transparent}.y-scroll::-webkit-scrollbar-thumb{background:var(--yaar-border);border-radius:3px}
.y-toast{position:fixed;bottom:var(--yaar-sp-4);left:50%;transform:translateX(-50%) translateY(20px);padding:var(--yaar-sp-2) var(--yaar-sp-4);border-radius:var(--yaar-radius);font-size:var(--yaar-text-sm);color:var(--yaar-text);background:var(--yaar-bg-surface);border:1px solid var(--yaar-border);box-shadow:var(--yaar-shadow-lg);opacity:0;transition:opacity var(--yaar-ease),transform var(--yaar-ease);pointer-events:none;z-index:9999}

.y-toast-info{border-color:var(--yaar-accent)}.y-toast-success{border-color:var(--yaar-success)}.y-toast-error{border-color:var(--yaar-error)}
.y-transition{transition:all var(--yaar-ease)}
.y-overflow-hidden{overflow:hidden}

body {
  height: 100%;
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', Tahoma, sans-serif;
  color: #1f2c3b;
  color-scheme: light;
  background: #e4eff3;
}
* {
  box-sizing: border-box;
}

/* ── Root layout ── */
.editor-root {
  display: flex;
  height: 100%;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: #f1f7fa;
  border-right: 1.5px solid #c2d3db;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-mode-toggle {
  display: flex;
  flex-shrink: 0;
  border-bottom: 1.5px solid #c2d3db;
}

.sidebar-mode-toggle button {
  flex: 1;
  padding: 13px 8px;
  border: none;
  border-radius: 0;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  background: #e6f0f5;
  color: #4d6879;
  transition:
    background 0.2s,
    color 0.2s,
    transform 0.1s;
}

.sidebar-mode-toggle button.active {
  background: #235f7c;
  color: #fff;
}

.sidebar-mode-toggle button:hover:not(.active) {
  background: #d8e9f1;
}

.sidebar-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px 10px 16px;
}

.sb-title {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #5a7688;
  margin: 12px 0 5px;
}

.sb-title:first-child {
  margin-top: 0;
}

.sb-divider {
  border: none;
  border-top: 1px solid #cddae2;
  margin: 10px 0;
}

/* Sidebar inputs */
.sb-input {
  width: 100%;
  padding: 7px 9px;
  border: 1px solid #b3c7d1;
  border-radius: 7px;
  font-size: 12px;
  background: #fff;
  color: #13222d;
  outline: none;
}

.sb-input:focus {
  border-color: #5599b8;
  box-shadow: 0 0 0 2px rgba(85, 153, 184, 0.18);
}

.sb-row {
  display: flex;
  gap: 6px;
  align-items: center;
}

.sb-btn {
  padding: 7px 10px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid #b3c7d1;
  border-radius: 7px;
  background: #e4eef3;
  color: #2b4a5e;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.12s;
}

.sb-btn:hover {
  background: #d0e4ed;
}
.sb-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.sb-btn.icon {
  padding: 7px 11px;
  font-size: 15px;
}

/* File browser */
.storage-status {
  font-size: 11px;
  color: #5a7688;
  min-height: 15px;
  margin: 5px 0 3px;
}

.storage-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin-top: 4px;
}

.storage-item {
  display: flex;
  flex-direction: column;
  padding: 7px 9px;
  border-radius: 7px;
  border: 1px solid transparent;
  background: transparent;
  cursor: pointer;
  text-align: left;
  width: 100%;
  transition:
    background 0.1s,
    border-color 0.1s;
}

.storage-item:hover {
  background: #dcedf5;
  border-color: #adcada;
}

.storage-item.active {
  background: #c8e2ef;
  border-color: #72b2ce;
}

.file-name {
  font-size: 12px;
  font-weight: 600;
  color: #1a3a4e;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.file-dir {
  font-size: 10px;
  color: #7a98a8;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-top: 2px;
}

.storage-empty {
  font-size: 12px;
  color: #6a8494;
  padding: 10px 4px;
  text-align: center;
}

.storage-hint {
  font-size: 10px;
  color: #7a9aaa;
  margin-top: 6px;
}

/* Composition settings grid */
.comp-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.comp-grid label {
  font-size: 10px;
  font-weight: 700;
  color: #5a7688;
  display: block;
  margin-bottom: 2px;
}

.comp-grid .sb-input {
  padding: 5px 7px;
}

/* Scene list in sidebar */
.scene-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.scene-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 8px;
  border-radius: 7px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid transparent;
  background: rgba(255, 255, 255, 0.7);
}

.scene-item:hover {
  background: #edf4f7;
}

.scene-item.selected {
  background: #d8eaf3;
  border-color: #9abfd3;
}

.scene-item .scene-color {
  width: 10px;
  height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}

.scene-item .scene-info {
  flex: 1;
  min-width: 0;
}

.scene-item .scene-name {
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.scene-item .scene-range {
  font-size: 10px;
  color: #5e7381;
  margin-top: 1px;
}

.scene-item .scene-delete {
  padding: 2px 7px;
  font-size: 11px;
  border-radius: 4px;
  flex-shrink: 0;
  background: transparent;
  border: 1px solid #c8d5dc;
  cursor: pointer;
}

.scene-item .scene-delete:hover {
  background: #fde0e0;
  border-color: #f08888;
}

/* ── Main content ── */
.editor-main {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-width: 0;
}

.panel {
  background: rgba(255, 255, 255, 0.94);
  border-radius: 12px;
  border: 1px solid #c5d5de;
  padding: 14px;
}

.panel-title {
  font-size: 13px;
  font-weight: 700;
  color: #2b4859;
  margin-bottom: 11px;
}

/* Video */
.video-wrap {
  border-radius: 10px;
  overflow: hidden;
  background: #0d1014;
  min-height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
}

video {
  width: 100%;
  max-height: 400px;
  background: #111;
  display: block;
}

/* Trim controls */
.trim-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.trim-grid label,
.field-label {
  font-size: 12px;
  font-weight: 600;
  color: #334f63;
  display: block;
  margin-bottom: 3px;
}

input[type='number'],
select {
  width: 100%;
  padding: 7px 9px;
  border: 1px solid #b3c7d1;
  border-radius: 7px;
  font-size: 13px;
  background: #fff;
  color: #13222d;
  outline: none;
}

input[type='number']:focus,
select:focus {
  border-color: #5599b8;
}

input[type='range'] {
  width: 100%;
  margin-top: 5px;
  accent-color: #2a6282;
}

.action-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-wrap: wrap;
  margin-top: 10px;
}

.action-row button,
.action-row select {
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid #b3c7d1;
  border-radius: 7px;
  background: #e4eef3;
  color: #1e3a4d;
  cursor: pointer;
  transition: background 0.12s;
  width: auto;
}

.action-row button:hover {
  background: #d0e4ed;
}
.action-row button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.action-row .grow {
  flex: 1;
  min-width: 140px;
}

.stats-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.chip {
  padding: 6px 12px;
  border-radius: 999px;
  background: #edf5f9;
  border: 1px solid #c2d5de;
  font-size: 13px;
  font-weight: 600;
}

.status-text {
  font-size: 12px;
  color: #2b4f67;
  min-height: 16px;
  margin-top: 6px;
}

.shortcuts-text {
  font-size: 11px;
  color: #5a7688;
  margin-top: 8px;
  line-height: 1.5;
}

.error-text {
  color: #9a1f1f;
  font-size: 13px;
  min-height: 16px;
  margin-top: 4px;
}

progress {
  width: 100%;
  height: 8px;
  border-radius: 4px;
  border: none;
  margin-top: 6px;
  accent-color: #2a6282;
}

/* Canvas */
.canvas-wrap {
  border-radius: 10px;
  overflow: hidden;
  background: #0d1014;
  display: flex;
  align-items: center;
  justify-content: center;
}

.canvas-wrap canvas {
  width: 100%;
  max-height: 380px;
  background: #111;
}

/* Timeline */
.timeline-track {
  position: relative;
  height: 40px;
  background: #1a2733;
  border-radius: 6px;
  overflow: hidden;
}

.timeline-block {
  position: absolute;
  top: 2px;
  bottom: 2px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 6px;
  cursor: pointer;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  min-width: 4px;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.timeline-block.selected {
  border: 2px solid #fff;
}

.timeline-playhead {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: #ff4444;
  pointer-events: none;
  z-index: 10;
  transition: left 34ms linear;
}

/* Scene properties panel */
.scene-props-panel {
  margin-top: 6px;
  border-top: 1px solid #cddae2;
  padding-top: 4px;
}

.props-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
  margin-top: 4px;
}

.props-field {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.props-label {
  font-size: 10px;
  font-weight: 700;
  color: #5a7688;
  display: block;
}

.props-field .sb-input {
  padding: 5px 6px;
  font-size: 11px;
}

.props-field input[type='color'] {
  padding: 2px 4px;
  height: 30px;
  cursor: pointer;
}

@media (max-width: 580px) {
  .sidebar {
    width: 200px;
  }
  .trim-grid {
    grid-template-columns: 1fr;
  }
  .comp-grid {
    grid-template-columns: 1fr;
  }
  .props-grid {
    grid-template-columns: 1fr;
  }
}

.sidebar-mode-toggle button:active {
  transform: scale(0.96);
}

.scene-item {
  transition:
    background 0.15s,
    border-color 0.15s,
    transform 0.1s;
}

.scene-item.selected {
  animation: scene-select-flash 0.3s ease-out;
}

@keyframes scene-select-flash {
  0% {
    background: #c8e2ef;
  }
  40% {
    background: #a8d0e8;
  }
  100% {
    background: #d8eaf3;
  }
}

.timeline-block {
  transition:
    left 0.1s ease-out,
    width 0.1s ease-out,
    border-color 0.1s;
}

/* ── Layer list in sidebar ── */
.layer-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin-bottom: 2px;
}

.layer-group-item {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 5px 7px;
  border-radius: 7px;
  border: 1px solid transparent;
  background: rgba(255, 255, 255, 0.6);
  cursor: pointer;
  transition:
    background 0.12s,
    border-color 0.12s;
}

.layer-group-item:hover {
  background: #edf4f7;
}

.layer-group-item.selected {
  background: #d8eaf3;
  border-color: #9abfd3;
}

.layer-name {
  flex: 1;
  font-size: 12px;
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: #1a3a4e;
  cursor: pointer;
}

.layer-icon-btn {
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 13px;
  padding: 1px 3px;
  border-radius: 4px;
  line-height: 1;
  transition: background 0.1s;
}

.layer-icon-btn:hover {
  background: rgba(0, 0, 0, 0.08);
}

.layer-icon-btn.layer-delete:hover {
  background: #fde0e0;
}

/* ── Timeline multi-row ── */
.timeline-track {
  position: relative;
  background: #1a2733;
  border-radius: 6px;
  overflow: hidden;
  min-height: 40px;
}

.tl-playhead-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  pointer-events: none;
  z-index: 10;
}

.tl-layer-row {
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid rgba(255, 255, 255, 0.07);
  min-height: 36px;
}

.tl-layer-row:last-child {
  border-bottom: none;
}

.tl-layer-row.selected .tl-layer-label {
  background: rgba(85, 153, 184, 0.25);
  color: #9dd3ee;
}

.tl-layer-row.hidden-layer .tl-layer-area {
  opacity: 0.4;
}

.tl-layer-label {
  width: 72px;
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 700;
  color: #7fa8be;
  padding: 4px 6px;
  display: flex;
  align-items: center;
  background: rgba(0, 0, 0, 0.2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: pointer;
  border-right: 1px solid rgba(255, 255, 255, 0.07);
  transition:
    background 0.12s,
    color 0.12s;
}

.tl-layer-label:hover {
  background: rgba(85, 153, 184, 0.15);
}

.tl-layer-area {
  flex: 1;
  position: relative;
  min-width: 0;
}

/* ── Scene list layer grouping ── */
.scene-layer-header {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 6px;
  margin-top: 6px;
  border-radius: 5px;
  background: #e6eef3;
  border: 1px solid #c5d3dc;
  font-size: 10px;
  cursor: pointer;
}

.scene-layer-header:first-child {
  margin-top: 0;
}

.scene-layer-header.active-layer {
  background: #cce2ef;
  border-color: #90bbd4;
}

.scene-layer-vis {
  font-size: 12px;
  cursor: pointer;
  padding: 1px 2px;
  border-radius: 3px;
  transition: background 0.1s;
}

.scene-layer-vis:hover {
  background: rgba(0, 0, 0, 0.08);
}

.scene-layer-name {
  flex: 1;
  font-weight: 700;
  color: #2b4859;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: pointer;
}

.scene-layer-count {
  color: #7a98a8;
  font-size: 10px;
  flex-shrink: 0;
}

.scene-item.locked {
  opacity: 0.7;
}

.scene-item.locked .scene-delete {
  opacity: 0.4;
  cursor: not-allowed;
}
