body {
  margin: 0;
  height: 100%;
  overflow: hidden;
}
#app {
  height: 100%;
}

/* ── Header ──────────────────────────────────────────────────────────────── */

.header-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--yaar-border);
  flex-shrink: 0;
}

.header-left {
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-width: 0;
}

.header-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--yaar-text);
  letter-spacing: -0.3px;
}

.header-status {
  font-size: 13px;
}

.header-domain {
  font-size: 12px;
  color: var(--yaar-text-dim, var(--yaar-text-muted));
}

.refresh-btn {
  font-size: 14px;
  padding: 7px 16px;
  flex-shrink: 0;
  white-space: nowrap;
}

/* ── Filter bar ──────────────────────────────────────────────────────────── */

.filter-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 18px;
  border-bottom: 1px solid var(--yaar-border);
  flex-shrink: 0;
}

.filter-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 500;
  color: var(--yaar-text);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}

.filter-toggle input[type="checkbox"] {
  width: 15px;
  height: 15px;
  cursor: pointer;
  accent-color: var(--yaar-accent);
  flex-shrink: 0;
}

.filter-count {
  margin-left: auto;
  font-size: 13px;
  white-space: nowrap;
}

/* ── App list grid ───────────────────────────────────────────────────────── */

.list-grid {
  padding: 14px 18px;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  display: grid;
  gap: 10px;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  align-content: start;
}

.empty-msg {
  grid-column: 1 / -1;
  padding: 32px 0;
  text-align: center;
  font-size: 14px;
}

/* ── App card ────────────────────────────────────────────────────────────── */

.app-card {
  display: flex;
  align-items: center;
  gap: 14px;
  min-height: 76px;
  padding: 12px 14px;
}

.app-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.app-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--yaar-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.app-subtitle {
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.app-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

/* Installed badge */
.installed-badge {
  font-size: 12px;
  font-weight: 600;
  color: var(--yaar-success);
  white-space: nowrap;
  padding: 2px 0;
}

/* Uninstall button — muted danger style */
.uninstall-btn {
  color: var(--yaar-error) !important;
  border-color: color-mix(in srgb, var(--yaar-error) 40%, transparent) !important;
  background: transparent !important;
  font-size: 13px;
}

.uninstall-btn:hover:not(:disabled) {
  background: color-mix(in srgb, var(--yaar-error) 12%, transparent) !important;
  border-color: var(--yaar-error) !important;
}

.uninstall-btn:disabled {
