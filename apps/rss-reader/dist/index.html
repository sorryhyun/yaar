body {
  margin: 0;
  font-family: var(--yaar-font);
  background: var(--yaar-bg);
  color: var(--yaar-text);
  height: 100dvh;
  overflow: hidden;
}

/* ── 3-column grid ───────────────────────────────────────────────── */

#layout {
  display: grid;
  grid-template-columns: 220px 300px 1fr;
  height: 100dvh;
}

/* ── Feeds panel ────────────────────────────────────────────────── */

.feeds-panel {
  display: grid;
  grid-template-rows: auto 1fr auto;
  border-right: 1px solid var(--yaar-border);
  min-height: 0;
  overflow: hidden;
}

/* ── Articles panel ─────────────────────────────────────────────── */

.articles-panel {
  display: grid;
  grid-template-rows: auto 1fr;
  border-right: 1px solid var(--yaar-border);
  min-height: 0;
  overflow: hidden;
}

/* ── Content panel ──────────────────────────────────────────────── */

.content-panel {
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}

/* .content-main is a stable (non-reactive) flex child → safe to use flex:1 */
.content-main {
  flex: 1;
  min-height: 0;
  position: relative;
}

/* ── Shared panel header ───────────────────────────────────────────── */

.panel-hdr {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: var(--yaar-sp-2) var(--yaar-sp-3); /* was 10px 12px */
  border-bottom: 1px solid var(--yaar-border);
  font-size: 13px;
  flex-shrink: 0;
}
.panel-hdr strong {
  flex: 1;
}

/* ── Feed list ─────────────────────────────────────────────────────── */

.feed-list {
  overflow-y: auto;
  padding: 6px;
}

.feed-item {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 7px var(--yaar-sp-2); /* was 7px 8px */
  border-radius: var(--yaar-radius);
  cursor: pointer;
  font-size: 13px;
  user-select: none;
  transition: background 0.1s;
}
.feed-item:hover {
  background: var(--yaar-bg-surface);
}
.feed-item.active {
  background: var(--yaar-bg-surface);
  color: var(--yaar-accent);
}

.feed-label {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.unread-pill {
  background: var(--yaar-accent);
  color: var(--yaar-bg);        /* was #fff — use dark bg for contrast on accent */
  border-radius: 999px;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 5px;
  flex-shrink: 0;
}

.rm-btn {
  opacity: 0;
  border: none;
  background: none;
  color: var(--yaar-text-muted);
  cursor: pointer;
  font-size: 10px;
  padding: 2px 4px;
  border-radius: 3px;
  line-height: 1;
  flex-shrink: 0;
  transition:
    color 0.1s,
    background 0.1s;
}
.feed-item:hover .rm-btn {
  opacity: 1;
}
.rm-btn:hover {
  color: var(--yaar-error);
  background: color-mix(in srgb, var(--yaar-error) 12%, transparent); /* was rgba(248,81,73,0.12) */
}

.dot-blink {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--yaar-accent);
  display: inline-block;
  animation: blink 1s infinite;
  flex-shrink: 0;
}
@keyframes blink {
  0%,
  100% {
    opacity: 0.2;
  }
  50% {
    opacity: 1;
  }
}

/* ── Add feed area ────────────────────────────────────────────────── */

.add-area {
  padding: var(--yaar-sp-2);  /* was 8px */
  border-top: 1px solid var(--yaar-border);
}
.add-form {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.add-actions {
  display: flex;
  gap: 6px;
}

/* ── Article list ─────────────────────────────────────────────────── */

.article-list {
  overflow-y: auto;
  padding: 6px;
}

.article-item {
  padding: var(--yaar-sp-2);  /* was 8px 10px */
  border-radius: var(--yaar-radius);
  border-left: 2px solid transparent;
  cursor: pointer;
  margin-bottom: 2px;
  transition: background 0.1s;
}
.article-item:hover {
  background: var(--yaar-bg-surface);
}
.article-item.active {
  background: var(--yaar-bg-surface);
  border-left-color: var(--yaar-accent);
}

.art-title {
  font-size: 13px;
  line-height: 1.4;
  margin-bottom: 3px;
  /* clamp handled by y-clamp-2 utility class */
}
.article-item.unread .art-title {
  font-weight: 700;
}

.art-meta {
  font-size: 11px;
  color: var(--yaar-text-muted);
}

/* Augments y-empty: custom font-size and line-height for hint text */
.empty-hint {
  font-size: 13px;
  line-height: 1.6;
  padding: var(--yaar-sp-4) var(--yaar-sp-3); /* was 24px 12px → 16px 12px */
}

/* ── Splash (no article selected) ────────────────────────────────── */

/* position:absolute inside .content-main (position:relative) fills the space
   without relying on flex:1 inside a reactive SolidJS expression */
.splash {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--yaar-text-muted);
  font-size: 14px;
}
.splash-icon {
  font-size: 40px;
}

/* ── Article view ──────────────────────────────────────────────────── */

.art-view {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-rows: auto 1fr;
  overflow: hidden;
}

.art-header {
  padding: 14px 18px 10px;
  border-bottom: 1px solid var(--yaar-border);
  flex-shrink: 0;
}
.art-view-title {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: var(--yaar-sp-2); /* was 8px */
}
.art-view-meta {
  display: flex;
  gap: var(--yaar-sp-3);           /* was 12px */
  flex-wrap: wrap;
  font-size: 12px;
  color: var(--yaar-text-muted);
  align-items: center;
}
.ext-link {
  color: var(--yaar-accent);
  text-decoration: none;
}
.ext-link:hover {
  text-decoration: underline;
}

.art-body {
  overflow-y: auto;
  padding: var(--yaar-sp-4);       /* was 16px 18px */
  font-size: 14px;
  line-height: 1.7;
}
.art-body img {
  max-width: 100%;
  height: auto;
  border-radius: var(--yaar-radius);
}
.art-body a {
  color: var(--yaar-accent);
}
.art-body p {
  margin: 0 0 var(--yaar-sp-3);    /* was 0 0 12px */
}
.art-body h1,
.art-body h2,
.art-body h3 {
  margin: var(--yaar-sp-4) 0 var(--yaar-sp-2); /* was 16px 0 8px */
  line-height: 1.3;
}
.art-body pre {
  background: var(--yaar-bg-surface);
  padding: var(--yaar-sp-2) var(--yaar-sp-3);  /* was 10px 12px */
  border-radius: var(--yaar-radius);
  overflow-x: auto;
  font-size: 13px;
}
.art-body code {
  font-size: 13px;
}
.art-body blockquote {
  border-left: 3px solid var(--yaar-border);
  margin: 0 0 var(--yaar-sp-3);                /* was 0 0 12px */
  padding: var(--yaar-sp-1) var(--yaar-sp-3);  /* was 4px 12px */
  color: var(--yaar-text-muted);
}
