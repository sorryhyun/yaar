  --yaar-bg: #f8f9fa;
  --yaar-bg-surface: #ffffff;
  --yaar-bg-surface-hover: #f0f1f3;
  --yaar-text: #1f2328;
  --yaar-text-muted: #656d76;
  --yaar-text-dim: #8b949e;
  --yaar-border: #d0d7de;
  --yaar-shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.08);
  --yaar-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}
body {
  margin: 0;
  background: var(--yaar-bg);
  color: var(--yaar-text);
}
.wrap {
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
}
.top {
  display: flex;
  gap: 8px;
  align-items: center;
  padding: 10px;
  border-bottom: 1px solid var(--yaar-border);
  background: var(--yaar-bg-surface);
  flex-wrap: wrap;
}
.top button.active {
  background: var(--yaar-accent);
  color: #fff;
  border-color: var(--yaar-accent);
}
.top .spacer {
  flex: 1;
}
.pane {
  height: calc(100vh - 58px);
}
.hidden {
  display: none !important;
}
.viewer-pane {
  display: grid;
  grid-template-rows: auto 1fr;
}
.viewer-controls {
  display: flex;
  gap: 8px;
  padding: 10px;
  border-bottom: 1px solid var(--yaar-border);
  align-items: center;
  flex-wrap: wrap;
}
.storage-browser {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.storage-list {
  min-width: 300px;
  max-width: 420px;
}
.viewer-frame {
  width: 100%;
  height: 100%;
  border: 0;
  background: var(--yaar-bg-surface-hover);
}
.drop {
  border: 2px dashed var(--yaar-border);
  border-radius: 12px;
  padding: 28px;
  margin: 12px;
  text-align: center;
  color: var(--yaar-text-muted);
}
.drop.drag {
  border-color: var(--yaar-accent);
  color: var(--yaar-accent);
}
.export-pane {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100%;
}
.export-left,
.export-right {
  padding: 10px;
  overflow: auto;
}
.export-left {
  border-right: 1px solid var(--yaar-border);
}
textarea {
  width: 100%;
  height: calc(100% - 60px);
  min-height: 220px;
  resize: vertical;
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius);
  padding: 10px;
  box-sizing: border-box;
  background: var(--yaar-bg-surface);
  color: var(--yaar-text);
  font: inherit;
}
.preview {
  background: var(--yaar-bg-surface);
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius);
  padding: 20px;
  min-height: 92%;
  color: var(--yaar-text);
}
@media print {
  body * {
    visibility: hidden !important;
  }
  #print-area,
  #print-area * {
    visibility: visible !important;
  }
  #print-area {
    position: fixed;
    inset: 0;
    background: white;
    color: #000;
    padding: 20mm;
