@font-face{font-family:'NanumSquareNeo';src:url('/NanumSquareNeoOTF-Rg.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'NanumSquareNeo';src:url('/NanumSquareNeoOTF-Bd.otf') format('opentype');font-weight:700;font-style:normal;font-display:swap}

:root {

  --yaar-bg-surface: #161b22;
  --yaar-bg-surface-hover: #1c2129;
  --yaar-text: #e6edf3;

  --yaar-text-dim: #6e7681;
  --yaar-accent: #58a6ff;
  --yaar-accent-hover: #79c0ff;
  --yaar-border: #30363d;
  --yaar-success: #3fb950;
  --yaar-error: #f85149;
  --yaar-warning: #d29922;
  --yaar-sp-1: 4px;
  --yaar-sp-2: 8px;
  --yaar-sp-3: 12px;
  --yaar-sp-4: 16px;
  --yaar-sp-5: 20px;
  --yaar-sp-6: 24px;
  --yaar-sp-8: 32px;
  --yaar-radius-sm: 4px;
  --yaar-radius: 6px;
  --yaar-radius-lg: 10px;

}
.y-app{display:flex;flex-direction:column;height:100%;color:var(--yaar-text);background:var(--yaar-bg);font-family:var(--yaar-font);font-size:var(--yaar-text-base);line-height:1.5}

.y-text-xs{font-size:var(--yaar-text-xs)}.y-text-sm{font-size:var(--yaar-text-sm)}.y-text-base{font-size:var(--yaar-text-base)}.y-text-lg{font-size:var(--yaar-text-lg)}.y-text-xl{font-size:var(--yaar-text-xl)}

body {
  margin: 0;
  font-family: Inter, system-ui, sans-serif;
  background: var(--yaar-bg);
  color: var(--yaar-text);
  height: 100dvh;
  overflow: hidden;
}
#layout {
  display: grid;
  grid-template-columns: 340px 1fr;
  height: 100dvh;
  min-height: 0;
}
.panel {
  border-right: 1px solid var(--yaar-border);
  overflow: auto;
  min-height: 0;
}
.panel-right {
  display: grid;
  grid-template-rows: auto minmax(0, 1fr) auto auto;
  min-height: 0;
  overflow: hidden;
}
.toolbar,

  padding: 12px;
  border-bottom: 1px solid var(--yaar-border);
}
.composer {
  padding: 12px;
  border-top: 1px solid var(--yaar-border);
}
.post-list {
  padding: 8px;
}
.post-item {
  padding: 10px;
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius-lg);
  margin-bottom: 8px;
  cursor: pointer;
  transition:
    border-color 0.15s,
    background 0.15s;
}
.post-item:hover,
.post-item.active {
  border-color: var(--yaar-accent);
  background: var(--yaar-bg-surface);
}
.title {
  font-weight: 700;
  margin-bottom: 6px;
}
.post-view {
  padding: 14px;
  overflow: auto;
  min-height: 0;
}
.row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
textarea {
  min-height: 88px;
  resize: vertical;
  width: 100%;
}
.comments {
  margin-top: 8px;
}
.comment {
  border-top: 1px solid var(--yaar-border);
  padding: 8px 0;
  white-space: pre-wrap;
}
.status {
  padding: 6px 12px;
  border-top: 1px solid var(--yaar-border);
  font-size: 12px;
  color: var(--yaar-accent);
}
.pill {
  border: 1px solid var(--yaar-border);
  border-radius: 999px;
  padding: 2px 8px;
  font-size: 12px;
}
