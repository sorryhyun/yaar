@font-face{font-family:'NanumSquareNeo';src:url('/NanumSquareNeoOTF-Rg.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap}

:root {
  --yaar-bg: #0f1117;
  --yaar-bg-surface: #161b22;
  --yaar-bg-surface-hover: #1c2129;
  --yaar-text: #e6edf3;

  --yaar-text-dim: #6e7681;
  --yaar-accent: #58a6ff;
  --yaar-accent-hover: #79c0ff;
  --yaar-border: #30363d;
  --yaar-success: #3fb950;
  --yaar-error: #f85149;
  --yaar-warning: #d29922;
  --yaar-sp-1: 4px;
  --yaar-sp-2: 8px;
  --yaar-sp-3: 12px;
  --yaar-sp-4: 16px;
  --yaar-sp-5: 20px;
  --yaar-sp-6: 24px;
  --yaar-sp-8: 32px;
  --yaar-radius-sm: 4px;
  --yaar-radius: 6px;
  --yaar-radius-lg: 10px;

  --yaar-shadow-sm: 0 1px 2px rgba(0,0,0,.3);

}
.y-app{display:flex;flex-direction:column;height:100%;color:var(--yaar-text);background:var(--yaar-bg);font-family:var(--yaar-font);font-size:var(--yaar-text-base);line-height:1.5}

.browser-chrome {
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
}

.url-bar {
  min-height: 40px;
}

.url-bar .lock {
  font-size: 12px;
  color: #4caf50;
  flex-shrink: 0;
}

.url-bar .lock.insecure {
  color: #ff9800;
}

.url-bar .url-text {
  flex: 1;
  border-radius: 16px;
}

.url-bar .title-text {
  flex-shrink: 0;
  max-width: 200px;
}

.screenshot-area {
  position: relative;
  overflow: auto;
  background: var(--yaar-bg);
  cursor: default;
}

.screenshot-area img {
  display: block;
  width: 100%;
  height: auto;
  image-rendering: auto;
}

.screenshot-area .placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
}

.loading-bar {
  position: absolute;
  top: 0;
  left: 0;
  height: 2px;
  background: var(--yaar-accent);
  animation: loading 1.5s ease-in-out infinite;
  display: none;
}

.loading-bar.active {
  display: block;
}

@keyframes loading {
  0% {
    width: 0%;
  }
  50% {
    width: 70%;
  }
  100% {
    width: 100%;
    opacity: 0;
  }
}
