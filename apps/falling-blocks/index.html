html, body { height: 100%; margin: 0; }
body {
  background: #06080f;
  color: var(--yaar-text);
  display: grid;
  place-items: center;
  min-height: 100vh;
  font-family: var(--yaar-font, system-ui, sans-serif);
}

#app {
  display: flex;
  gap: 18px;
  padding: 20px;
  border-radius: 16px;
  background: rgba(8, 12, 24, 0.82);
  box-shadow: 0 0 40px rgba(0, 100, 255, 0.15), 0 8px 32px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(16px);
}

/* Game area */
.game-wrap {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(80,120,255,0.12), inset 0 0 20px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.07);
}
.game-wrap canvas {
  display: block;
  image-rendering: pixelated;
}
#bg-canvas {
  position: absolute;
  inset: 0;
  z-index: 0;
}
.game-wrap > canvas:not(#bg-canvas) {
  position: relative;
  z-index: 1;
  background: transparent;
}

/* Panel */
.panel {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-width: 200px;
  max-width: 220px;
}
.panel-title {
  font-weight: 900;
  font-size: 16px;
  letter-spacing: 2px;
  background: linear-gradient(90deg, #58a6ff, #b35cff, #ff4c68);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  padding: 4px 0;
}

/* Cards */
.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 12px;
  padding: 12px;
}

/* Stats */
.stat {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 3px 0;
  font-size: 13px;
}
.stat-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--yaar-text-muted);
}
.stat-value {
  font-variant-numeric: tabular-nums;
  font-size: 15px;
  font-weight: 700;
  color: var(--yaar-text);
}
.hi-val { color: #FFE04A; }
.level-val { color: #58E05E; }

.combo-badge {
  margin-top: 6px;
  text-align: center;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 1px;
  color: #FF9E2C;
  background: rgba(255, 158, 44, 0.15);
  border: 1px solid rgba(255,158,44,0.4);
  border-radius: 8px;
  padding: 4px 8px;
  animation: comboPulse 0.4s ease-out;
}
@keyframes comboPulse {
  0% { transform: scale(1.3); opacity: 0.6; }
  100% { transform: scale(1); opacity: 1; }
}

/* Mini previews */
.mini-wrap {
  display: flex;
  gap: 12px;
  justify-content: space-around;
}
.mini-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.mini-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--yaar-text-muted);
}
.hold-hint {
  font-size: 9px;
  color: rgba(255,255,255,0.35);
}
.mini-canvas-wrap {
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.07);
}
.mini-canvas-wrap canvas {
  display: block;
  image-rendering: pixelated;
}

/* Level bar */
.level-bar-card { padding: 10px 12px; }
.level-bar-label {
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--yaar-text-muted);
  margin-bottom: 6px;
}
.level-bar-bg {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
}
.level-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #3fb950, #58a6ff);
  border-radius: 3px;
  transition: width 0.3s ease;
  box-shadow: 0 0 6px rgba(88,166,255,0.5);
}
.level-bar-lines {
  font-size: 10px;
  color: var(--yaar-text-muted);
  margin-top: 4px;
  text-align: right;
}

/* Buttons */
.btn-card {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.btn-card .y-btn { flex: 1; justify-content: center; }

/* Help */
.help {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 0 2px;
}
.help-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--yaar-text-muted);
}
kbd {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 4px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  font-size: 10px;
  font-family: var(--yaar-font, monospace);
  min-width: 50px;
  text-align: center;
  color: var(--yaar-text);
}

/* Overlay */
.overlay {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  z-index: 10;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(4px);
}
.overlayBox {
  text-align: center;
  padding: 24px 32px;
  border-radius: 16px;
  background: rgba(8, 12, 28, 0.9);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 0 40px rgba(80,120,255,0.2);
}
.overlay-title {
  margin: 0 0 8px 0;
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 3px;
  color: var(--yaar-text);
}
.game-over-title {
  background: linear-gradient(90deg, #ff4c68, #b35cff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.overlay-score {
  margin: 0 0 4px 0;
  font-size: 16px;
  font-weight: 700;
  color: #FFE04A;
}
.overlay-hint {
  margin: 0;
  font-size: 13px;
  color: var(--yaar-text-muted);
}
