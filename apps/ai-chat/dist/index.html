  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* App-specific gradient tokens (not covered by --yaar-* design tokens) */
.chat-app {
  --grad-blue: linear-gradient(135deg, #1f6feb, #388bfd);
  --grad-avatar: linear-gradient(135deg, #58a6ff, #a371f7);

  display: flex;
  flex-direction: column;
  height: 100vh;
  background: var(--yaar-bg);
  font-family: var(--yaar-font);
}

/* ── Header ── */

.chat-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  background: var(--yaar-bg-surface);
  border-bottom: 1px solid var(--yaar-border);
  flex-shrink: 0;
}

.header-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--grad-avatar);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.header-info {
  flex: 1;
}

.header-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--yaar-text);
}

.header-status {
  font-size: 12px;
  color: var(--yaar-success);
  display: flex;
  align-items: center;
  gap: 4px;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--yaar-success);
}

/* ── Message list ── */

.messages-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

.messages-container::-webkit-scrollbar { width: 5px; }
.messages-container::-webkit-scrollbar-track { background: transparent; }
.messages-container::-webkit-scrollbar-thumb {
  background: var(--yaar-border);
  border-radius: 10px;
}

/* ── Message rows ── */

.message-row {
  display: flex;
  gap: 8px;
  animation: fadeSlideIn 0.2s ease-out;
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.message-row.user {
  flex-direction: row-reverse;
}

/* ── Avatars ── */

.message-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}

/* Both header and assistant message avatars share the same gradient */
.assistant .message-avatar {
  background: var(--grad-avatar);
}

.user .message-avatar {
  background: linear-gradient(135deg, #3fb950, #58a6ff);
}

/* ── Bubbles ── */

.message-bubble {
  max-width: 72%;
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.5;
  word-break: break-word;
  white-space: pre-wrap;
}

.assistant .message-bubble {
  background: var(--yaar-bg-surface);
  color: var(--yaar-text);
  border: 1px solid var(--yaar-border);
  border-top-left-radius: 4px;
}

.user .message-bubble {
  background: var(--grad-blue);
  color: #fff;
  border-top-right-radius: 4px;
}

.message-bubble.error {
  background: rgba(248, 81, 73, 0.1);
  border-color: var(--yaar-error);
  color: var(--yaar-error);
}

.message-time {
  font-size: 11px;
  color: var(--yaar-text-muted);
  margin-top: 4px;
  padding: 0 4px;
}

.message-row.user .message-time {
  text-align: right;
}

/* ── Typing indicator ── */

.typing-indicator {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 12px 16px;
}

.typing-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--yaar-text-muted);
  animation: typingBounce 1.2s infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0);   opacity: 0.4; }
  30%            { transform: translateY(-6px); opacity: 1; }
}

/* ── Input area ── */

.input-area {
  padding: 12px 16px;
  background: var(--yaar-bg-surface);
  border-top: 1px solid var(--yaar-border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
}

.input-wrapper {
  flex: 1;
  position: relative;
}

.chat-textarea {
  width: 100%;
  background: var(--yaar-bg);
  border: 1px solid var(--yaar-border);
  border-radius: 20px;
  padding: 10px 16px;
  color: var(--yaar-text);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  outline: none;
  line-height: 1.5;
  max-height: 120px;
  overflow-y: auto;
  transition: border-color 0.15s;
}

.chat-textarea:focus       { border-color: var(--yaar-accent); }
.chat-textarea::placeholder { color: var(--yaar-text-muted); }

/* ── Send button ── */

.send-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: var(--grad-blue);
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: opacity 0.15s, transform 0.1s;
  flex-shrink: 0;
}

.send-btn:hover:not(:disabled)  { opacity: 0.9; transform: scale(1.05); }
.send-btn:active:not(:disabled) { transform: scale(0.95); }
.send-btn:disabled               { opacity: 0.4; cursor: not-allowed; }

/* ── Empty state ── */

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--yaar-text-muted);
}
