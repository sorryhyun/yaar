  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --accent-hot: #f7b731;
  --accent-hot-bg: rgba(247, 183, 49, 0.08);
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: var(--yaar-bg);
  color: var(--yaar-text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-2);
  padding: var(--yaar-sp-2) var(--yaar-sp-3);
  background: var(--yaar-bg-surface);
  border-bottom: 1px solid var(--yaar-border);
  flex-shrink: 0;
  min-height: 52px;
}

.header-title {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-1);
  font-size: 16px;
  font-weight: 700;
  color: var(--yaar-text);
  flex-shrink: 0;
}

.header-title .icon {
  font-size: 18px;
}

.header-meta {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-2);
  flex: 1;
  font-size: 12px;
  color: var(--yaar-text-muted);
}

.new-badge {
  background: var(--yaar-accent);
  color: white;
  border-radius: 10px;
  padding: 1px 8px;
  font-size: 11px;
  font-weight: 600;
  animation: pulse 0.5s ease;
}

@keyframes pulse {
  0% {
    transform: scale(0.8);
    opacity: 0;
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}

.header-actions {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-1);
  flex-shrink: 0;
}

.countdown {
  font-size: 11px;
  color: var(--yaar-text-muted);
  font-variant-numeric: tabular-nums;
  min-width: 40px;
  text-align: right;
}

/* Active AI rec button */
.rec-btn-active {
  background: rgba(88, 166, 255, 0.12) !important;
  border: 1px solid rgba(88, 166, 255, 0.35) !important;
  color: var(--yaar-accent) !important;
}

/* ============ AI Recommendation Panel ============ */
.rec-panel {
  background: linear-gradient(135deg, rgba(88, 166, 255, 0.04) 0%, rgba(247, 183, 49, 0.04) 100%);
  border-bottom: 1px solid var(--yaar-border);
  flex-shrink: 0;
  overflow-y: auto;
  max-height: 260px;
  animation: slideDown 0.2s ease;
}

@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.rec-panel::-webkit-scrollbar {
  width: 4px;
}
.rec-panel::-webkit-scrollbar-track {
  background: transparent;
}
.rec-panel::-webkit-scrollbar-thumb {
  background: var(--yaar-border);
  border-radius: 2px;
}

.rec-loading {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-2);
  padding: var(--yaar-sp-3);
  color: var(--yaar-text-muted);
  font-size: 13px;
}

.rec-content {
  padding: var(--yaar-sp-2) var(--yaar-sp-3) var(--yaar-sp-3);
  display: flex;
  flex-direction: column;
  gap: var(--yaar-sp-2);
}

.rec-section {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.rec-section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--yaar-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* Topics */
.rec-topics {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.topic-chip {
  display: inline-flex;
  align-items: center;
  padding: 4px 12px;
  border-radius: 14px;
  font-size: 12px;
  font-weight: 500;
  background: rgba(88, 166, 255, 0.1);
  color: var(--yaar-accent);
  border: 1px solid rgba(88, 166, 255, 0.22);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  user-select: none;
}

.topic-chip:hover {
  background: rgba(88, 166, 255, 0.22);
  border-color: var(--yaar-accent);
  transform: translateY(-1px);
}

/* Best post card */
.best-post-card {
  background: var(--yaar-bg-surface);
  border: 1px solid rgba(247, 183, 49, 0.25);
  border-radius: var(--yaar-radius);
  padding: var(--yaar-sp-2) var(--yaar-sp-3);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.best-post-card:hover {
  border-color: var(--accent-hot);
  background: rgba(247, 183, 49, 0.06);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(247, 183, 49, 0.12);
}

.best-post-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent-hot);
  line-height: 1.4;
}

.best-post-reason {
  font-size: 12px;
  color: var(--yaar-text-muted);
  line-height: 1.55;
}

.best-post-stats {
  display: flex;
  gap: var(--yaar-sp-2);
  font-size: 11px;
  color: var(--yaar-text-muted);
  margin-top: 2px;
}

/* Rec footer */
.rec-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 6px;
  border-top: 1px solid var(--yaar-border);
  font-size: 10px;
  color: var(--yaar-text-muted);
}

/* ============ Filter chip in toolbar ============ */
.filter-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px 2px 10px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
  background: rgba(247, 183, 49, 0.14);
  color: var(--accent-hot);
  border: 1px solid rgba(247, 183, 49, 0.3);
  animation: pulse 0.3s ease;
}

.filter-chip-close {
  background: none;
  border: none;
  color: var(--yaar-text-muted);
  cursor: pointer;
  padding: 0 2px;
  font-size: 10px;
  line-height: 1;
  border-radius: 50%;
  transition: color 0.1s;
  display: flex;
  align-items: center;
}

.filter-chip-close:hover {
  color: var(--yaar-error);
}

/* Main layout */
.main-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Post list */
.post-list-panel {
  width: 42%;
  min-width: 280px;
  border-right: 1px solid var(--yaar-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

/* Post list toolbar */
.post-list-toolbar {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-1);
  padding: 6px var(--yaar-sp-2);
  border-bottom: 1px solid var(--yaar-border);
  background: var(--yaar-bg-surface);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.btn-filter-active {
  background: rgba(88, 166, 255, 0.12);
  border: 1px solid rgba(88, 166, 255, 0.4);
  color: var(--yaar-accent);
  font-size: 12px;
  padding: 3px 8px;
  border-radius: var(--yaar-radius);
  cursor: pointer;
  transition: background 0.15s;
}

.btn-filter-active:hover {
  background: rgba(88, 166, 255, 0.2);
}

.post-list-scroll {
  flex: 1;
  overflow-y: auto;
  padding: var(--yaar-sp-1) 0;
}

.post-list-scroll::-webkit-scrollbar {
  width: 4px;
}
.post-list-scroll::-webkit-scrollbar-track {
  background: transparent;
}
.post-list-scroll::-webkit-scrollbar-thumb {
  background: var(--yaar-border);
  border-radius: 2px;
}

/* Post item */
.post-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 10px var(--yaar-sp-3);
  border-bottom: 1px solid var(--yaar-border);
  cursor: pointer;
  transition: background 0.1s;
  text-decoration: none;
  color: inherit;
}

.post-item:hover {
  background: rgba(255, 255, 255, 0.03);
}

.post-item.selected {
  background: rgba(88, 166, 255, 0.06);
  border-left: 2px solid var(--yaar-accent);
  padding-left: calc(var(--yaar-sp-3) - 2px);
}

.post-item.hot {
  background: var(--accent-hot-bg);
}

.post-item.hot .post-title {
  color: var(--accent-hot);
}

.post-title-row {
  display: flex;
  align-items: flex-start;
  gap: var(--yaar-sp-1);
}

.post-title {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.4;
  color: var(--yaar-text);
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.post-category {
  font-size: 10px;
  background: rgba(88, 166, 255, 0.15);
  color: var(--yaar-accent);
  border-radius: 3px;
  padding: 1px 5px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 1px;
}

.post-meta {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-2);
  font-size: 11px;
  color: var(--yaar-text-muted);
}

.post-author {
  font-weight: 500;
  color: var(--yaar-text-muted);
  max-width: 80px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.post-date {
  flex: 1;
}

.post-stats {
  display: flex;
  gap: 8px;
  align-items: center;
}

.stat {
  display: flex;
  align-items: center;
  gap: 2px;
}

.stat-icon {
  font-size: 10px;
  opacity: 0.7;
}

.recommend-hot {
  color: var(--accent-hot);
  font-weight: 600;
}

/* Detail panel */
.detail-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--yaar-bg);
}

.detail-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--yaar-sp-2);
  color: var(--yaar-text-muted);
}

.detail-empty-icon {
  font-size: 48px;
  opacity: 0.3;
}

.detail-header {
  padding: var(--yaar-sp-3);
  border-bottom: 1px solid var(--yaar-border);
  background: var(--yaar-bg-surface);
  flex-shrink: 0;
}

.detail-title {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 8px;
}

.detail-meta {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-2);
  font-size: 12px;
  color: var(--yaar-text-muted);
}

.detail-open-link {
  margin-left: auto;
  font-size: 11px;
  color: var(--yaar-accent);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 4px;
}

.detail-open-link:hover {
  text-decoration: underline;
}

.detail-content {
  flex: 1;
  overflow-y: auto;
  padding: var(--yaar-sp-3);
  line-height: 1.7;
  font-size: 14px;
}

.detail-content::-webkit-scrollbar {
  width: 4px;
}
.detail-content::-webkit-scrollbar-track {
  background: transparent;
}
.detail-content::-webkit-scrollbar-thumb {
  background: var(--yaar-border);
  border-radius: 2px;
}

.detail-content img {
  max-width: 100%;
  border-radius: var(--yaar-radius);
  margin: 8px 0;
}

.detail-content p {
  margin-bottom: 8px;
}

/* Detail actions */
.detail-actions {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-1);
  margin-top: var(--yaar-sp-2);
}

/* Loading & Error */
.loading-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: var(--yaar-sp-2);
  color: var(--yaar-text-muted);
}

.error-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: var(--yaar-sp-2);
  padding: var(--yaar-sp-4);
  text-align: center;
}

.error-icon {
  font-size: 36px;
}

.error-msg {
  color: var(--yaar-error);
  font-size: 13px;
  max-width: 280px;
}

/* Settings panel */
.settings-overlay {
  position: absolute;
  top: 52px;
  right: 0;
  width: 260px;
  background: var(--yaar-bg-surface);
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius);
  padding: var(--yaar-sp-3);
  z-index: 100;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
}

.settings-title {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: var(--yaar-sp-2);
  color: var(--yaar-text);
}

.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--yaar-sp-2);
  font-size: 13px;
  color: var(--yaar-text-muted);
  margin-bottom: var(--yaar-sp-2);
}

.settings-select {
  background: var(--yaar-bg);
  border: 1px solid var(--yaar-border);
  color: var(--yaar-text);
  border-radius: var(--yaar-radius);
  padding: 4px 8px;
  font-size: 12px;
  cursor: pointer;
}

.post-num {
  color: var(--yaar-text-muted);
  font-size: 10px;
  min-width: 36px;
}

.divider {
  color: var(--yaar-border);
}

/* Screenshot */
.screenshot-wrap {
  display: flex;
  flex-direction: column;
  gap: var(--yaar-sp-2);
}

.screenshot-notice {
  font-size: 11px;
  color: var(--yaar-text-muted);
  text-align: center;
}
