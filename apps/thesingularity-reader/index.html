<html lang="en">

@font-face{font-family:'NanumSquareNeo';src:url('/NanumSquareNeoOTF-Rg.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'NanumSquareNeo';src:url('/NanumSquareNeoOTF-Bd.otf') format('opentype');font-weight:700;font-style:normal;font-display:swap}

:root {
  --yaar-bg: #0f1117;
  --yaar-bg-surface: #161b22;
  --yaar-bg-surface-hover: #1c2129;
  --yaar-text: #e6edf3;
  --yaar-text-muted: #8b949e;
  --yaar-text-dim: #6e7681;
  --yaar-accent: #58a6ff;
  --yaar-accent-hover: #79c0ff;
  --yaar-border: #30363d;
  --yaar-success: #3fb950;
  --yaar-error: #f85149;
  --yaar-warning: #d29922;
  --yaar-sp-1: 4px;
  --yaar-sp-2: 8px;
  --yaar-sp-3: 12px;
  --yaar-sp-4: 16px;
  --yaar-sp-5: 20px;
  --yaar-sp-6: 24px;
  --yaar-sp-8: 32px;
  --yaar-radius-sm: 4px;
  --yaar-radius: 6px;
  --yaar-radius-lg: 10px;
  --yaar-font: 'NanumSquareNeo', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --yaar-font-mono: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Consolas, monospace;
  --yaar-text-xs: 11px;
  --yaar-text-sm: 12px;
  --yaar-text-base: 13px;
  --yaar-text-lg: 15px;
  --yaar-text-xl: 18px;
  --yaar-shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --yaar-shadow: 0 2px 8px rgba(0,0,0,.4);
  --yaar-shadow-lg: 0 8px 24px rgba(0,0,0,.5);
  --yaar-ease: 150ms ease;
}
.y-app{display:flex;flex-direction:column;height:100%;color:var(--yaar-text);background:var(--yaar-bg);font-family:var(--yaar-font);font-size:var(--yaar-text-base);line-height:1.5}
.y-flex{display:flex}.y-flex-col{display:flex;flex-direction:column}.y-flex-center{display:flex;align-items:center;justify-content:center}.y-flex-between{display:flex;align-items:center;justify-content:space-between}.y-flex-1{flex:1;min-width:0;min-height:0}
.y-gap-1{gap:var(--yaar-sp-1)}.y-gap-2{gap:var(--yaar-sp-2)}.y-gap-3{gap:var(--yaar-sp-3)}.y-gap-4{gap:var(--yaar-sp-4)}

.y-p-1{padding:var(--yaar-sp-1)}.y-p-2{padding:var(--yaar-sp-2)}.y-p-3{padding:var(--yaar-sp-3)}.y-p-4{padding:var(--yaar-sp-4)}
.y-px-2{padding-left:var(--yaar-sp-2);padding-right:var(--yaar-sp-2)}.y-px-3{padding-left:var(--yaar-sp-3);padding-right:var(--yaar-sp-3)}.y-px-4{padding-left:var(--yaar-sp-4);padding-right:var(--yaar-sp-4)}
.y-py-2{padding-top:var(--yaar-sp-2);padding-bottom:var(--yaar-sp-2)}.y-py-3{padding-top:var(--yaar-sp-3);padding-bottom:var(--yaar-sp-3)}
.y-text-xs{font-size:var(--yaar-text-xs)}.y-text-sm{font-size:var(--yaar-text-sm)}.y-text-base{font-size:var(--yaar-text-base)}.y-text-lg{font-size:var(--yaar-text-lg)}.y-text-xl{font-size:var(--yaar-text-xl)}
.y-text-muted{color:var(--yaar-text-muted)}.y-text-dim{color:var(--yaar-text-dim)}.y-text-accent{color:var(--yaar-accent)}
.y-font-bold{font-weight:600}.y-font-mono{font-family:var(--yaar-font-mono)}
.y-truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.y-border{border:1px solid var(--yaar-border)}.y-border-b{border-bottom:1px solid var(--yaar-border)}.y-border-t{border-top:1px solid var(--yaar-border)}
.y-rounded{border-radius:var(--yaar-radius)}.y-rounded-lg{border-radius:var(--yaar-radius-lg)}

.y-surface{background:var(--yaar-bg-surface)}

.y-btn-sm{padding:var(--yaar-sp-1) var(--yaar-sp-2);font-size:var(--yaar-text-xs)}

.y-input:focus{border-color:var(--yaar-accent)}.y-input::placeholder{color:var(--yaar-text-dim)}

.y-badge-success{color:var(--yaar-success);border-color:var(--yaar-success);background:rgba(63,185,80,.1)}
.y-badge-error{color:var(--yaar-error);border-color:var(--yaar-error);background:rgba(248,81,73,.1)}
.y-badge-warning{color:var(--yaar-warning);border-color:var(--yaar-warning);background:rgba(210,153,34,.1)}
.y-badge-accent{color:var(--yaar-accent);border-color:var(--yaar-accent);background:rgba(88,166,255,.1)}

.y-spinner{width:16px;height:16px;border:2px solid var(--yaar-border);border-top-color:var(--yaar-accent);border-radius:50%;animation:y-spin .6s linear infinite}

.y-scroll::-webkit-scrollbar{width:6px}.y-scroll::-webkit-scrollbar-track{background:transparent}.y-scroll::-webkit-scrollbar-thumb{background:var(--yaar-border);border-radius:3px}

.y-transition{transition:all var(--yaar-ease)}
.y-overflow-hidden{overflow:hidden}

  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --accent-hot: #f7b731;
  --accent-hot-bg: rgba(247, 183, 49, 0.08);
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: var(--yaar-bg);
  color: var(--yaar-text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-2);
  padding: var(--yaar-sp-2) var(--yaar-sp-3);
  background: var(--yaar-bg-surface);
  border-bottom: 1px solid var(--yaar-border);
  flex-shrink: 0;
  min-height: 52px;
}

.header-title {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-1);
  font-size: 16px;
  font-weight: 700;
  color: var(--yaar-text);
  flex-shrink: 0;
}

.header-title .icon {
  font-size: 18px;
}

.header-meta {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-2);
  flex: 1;
  font-size: 12px;
  color: var(--yaar-text-muted);
}

.new-badge {
  background: var(--yaar-accent);
  color: white;
  border-radius: 10px;
  padding: 1px 8px;
  font-size: 11px;
  font-weight: 600;
  animation: pulse 0.5s ease;
}

@keyframes pulse {
  0% {
    transform: scale(0.8);
    opacity: 0;
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}

.header-actions {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-1);
  flex-shrink: 0;
}

.countdown {
  font-size: 11px;
  color: var(--yaar-text-muted);
  font-variant-numeric: tabular-nums;
  min-width: 40px;
  text-align: right;
}

/* Main layout */
.main-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Post list */
.post-list-panel {
  width: 42%;
  min-width: 280px;
  border-right: 1px solid var(--yaar-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

.post-list-scroll {
  flex: 1;
  overflow-y: auto;
  padding: var(--yaar-sp-1) 0;
}

.post-list-scroll::-webkit-scrollbar {
  width: 4px;
}
.post-list-scroll::-webkit-scrollbar-track {
  background: transparent;
}
.post-list-scroll::-webkit-scrollbar-thumb {
  background: var(--yaar-border);
  border-radius: 2px;
}

/* Post item */
.post-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 10px var(--yaar-sp-3);
  border-bottom: 1px solid var(--yaar-border);
  cursor: pointer;
  transition: background 0.1s;
  text-decoration: none;
  color: inherit;
}

.post-item:hover {
  background: rgba(255, 255, 255, 0.03);
}

.post-item.selected {
  background: rgba(88, 166, 255, 0.06);
  border-left: 2px solid var(--yaar-accent);
  padding-left: calc(var(--yaar-sp-3) - 2px);
}

.post-item.hot {
  background: var(--accent-hot-bg);
}

.post-item.hot .post-title {
  color: var(--accent-hot);
}

.post-title-row {
  display: flex;
  align-items: flex-start;
  gap: var(--yaar-sp-1);
}

.post-title {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.4;
  color: var(--yaar-text);
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.post-category {
  font-size: 10px;
  background: rgba(88, 166, 255, 0.15);
  color: var(--yaar-accent);
  border-radius: 3px;
  padding: 1px 5px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 1px;
}

.post-meta {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-2);
  font-size: 11px;
  color: var(--yaar-text-muted);
}

.post-author {
  font-weight: 500;
  color: var(--yaar-text-muted);
  max-width: 80px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.post-date {
  flex: 1;
}

.post-stats {
  display: flex;
  gap: 8px;
  align-items: center;
}

.stat {
  display: flex;
  align-items: center;
  gap: 2px;
}

.stat-icon {
  font-size: 10px;
  opacity: 0.7;
}

.recommend-hot {
  color: var(--accent-hot);
  font-weight: 600;
}

/* Detail panel */
.detail-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--yaar-bg);
}

.detail-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--yaar-sp-2);
  color: var(--yaar-text-muted);
}

.detail-empty-icon {
  font-size: 48px;
  opacity: 0.3;
}

.detail-header {
  padding: var(--yaar-sp-3);
  border-bottom: 1px solid var(--yaar-border);
  background: var(--yaar-bg-surface);
  flex-shrink: 0;
}

.detail-title {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 8px;
}

.detail-meta {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-2);
  font-size: 12px;
  color: var(--yaar-text-muted);
}

.detail-open-link {
  margin-left: auto;
  font-size: 11px;
  color: var(--yaar-accent);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 4px;
}

.detail-open-link:hover {
  text-decoration: underline;
}

.detail-content {
  flex: 1;
  overflow-y: auto;
  padding: var(--yaar-sp-3);
  line-height: 1.7;
  font-size: 14px;
}

.detail-content::-webkit-scrollbar {
  width: 4px;
}
.detail-content::-webkit-scrollbar-track {
  background: transparent;
}
.detail-content::-webkit-scrollbar-thumb {
  background: var(--yaar-border);
  border-radius: 2px;
}

.detail-content img {
  max-width: 100%;
  border-radius: var(--yaar-radius);
  margin: 8px 0;
}

.detail-content p {
  margin-bottom: 8px;
}

/* Loading & Error */
.loading-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: var(--yaar-sp-2);
  color: var(--yaar-text-muted);
}

.error-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: var(--yaar-sp-2);
  padding: var(--yaar-sp-4);
  text-align: center;
}

.error-icon {
  font-size: 36px;
}

.error-msg {
  color: var(--yaar-error);
  font-size: 13px;
  max-width: 280px;
}

/* Settings panel */
.settings-overlay {
  position: absolute;
  top: 52px;
  right: 0;
  width: 260px;
  background: var(--yaar-bg-surface);
  border: 1px solid var(--yaar-border);
  border-radius: var(--yaar-radius);
  padding: var(--yaar-sp-3);
  z-index: 100;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
}

.settings-title {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: var(--yaar-sp-2);
  color: var(--yaar-text);
}

.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--yaar-sp-2);
  font-size: 13px;
  color: var(--yaar-text-muted);
  margin-bottom: var(--yaar-sp-2);
}

.settings-select {
  background: var(--yaar-bg);
  border: 1px solid var(--yaar-border);
  color: var(--yaar-text);
  border-radius: var(--yaar-radius);
  padding: 4px 8px;
  font-size: 12px;
  cursor: pointer;
}

.post-num {
  color: var(--yaar-text-muted);
  font-size: 10px;
  min-width: 36px;
}

.divider {
  color: var(--yaar-border);
}
