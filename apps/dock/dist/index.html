body {
  width: 100%;
  height: 100%;
  background: transparent;
  margin: 0;
  color: var(--yaar-text);
  font-family: var(--yaar-font);
}

#app {
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: stretch;
  justify-content: stretch;
  user-select: none;
  box-sizing: border-box;
}

/* ── Panel: 3-row vertical layout ── */
.panel {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 6px 16px 8px;
  box-sizing: border-box;
  background: rgba(10, 12, 16, 0.55);
  border-bottom: 1px solid rgba(255, 255, 255, 0.10);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  gap: 1px;
}

/* ── Rows ── */
.row {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  line-height: 1;
}

.row-time {
  /* Row 1: big time */
}

.row-date {
  /* Row 2: date */
}

.row-bottom {
  /* Row 3: weather + notifications */
  gap: 6px;
}

/* ── Time (Row 1) ── */
.time {
  font-size: 30px;
  font-weight: 700;
  letter-spacing: 0.5px;
  line-height: 1;
  text-shadow: 0 1px 6px rgba(0, 0, 0, 0.7);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

/* ── Date (Row 2) ── */
.date {
  font-size: 12px;
  font-weight: 500;
  color: var(--yaar-text-muted);
  line-height: 1;
  text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  letter-spacing: 0.3px;
}

/* ── Separator (Row 3) ── */
.sep {
  color: rgba(255, 255, 255, 0.25);
  font-size: 14px;
  line-height: 1;
}

/* ── Weather (Row 3) ── */
.weather-section {
  display: flex;
  align-items: center;
  gap: 3px;
}
.weather-icon {
  font-size: 13px;
  line-height: 1;
}
.weather-temp {
  font-size: 12px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.weather-city {
  font-size: 11px;
  color: var(--yaar-text-muted);
  white-space: nowrap;

/* ── Notifications (Row 3) ── */
