body {

  height: 100%;

  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  user-select: none;
  padding: 0 8px;
  box-sizing: border-box;

.panel {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: flex-end;
  padding: 2px 12px;
  border-radius: 10px;
  background: rgba(10, 12, 16, 0.45);

  gap: 4px;

.clock-section {
  align-items: baseline;

  font-size: 16px;
  line-height: 1;
}
.weather-temp {
  font-size: 14px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.weather-city {
  font-size: 13px;

}

.notif-icon {
  font-size: 15px;
  line-height: 1;
}
.notif-count {
  font-size: 13px;
  font-weight: 700;
  color: var(--yaar-accent);
  font-variant-numeric: tabular-nums;
}
.notif-muted {
  color: rgba(255, 255, 255, 0.35);
}

/* clock */
.time {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0.1px;
  line-height: 1;
  text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
  font-variant-numeric: tabular-nums;
}
.date {
  font-size: 16px;
  font-weight: 600;
  color: var(--yaar-text);
  line-height: 1;
  text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);

}
