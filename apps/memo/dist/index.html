.memo-app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: var(--yaar-bg);
  color: var(--yaar-text);
  font-family: var(--yaar-font);
  overflow: hidden;
}

/* Toolbar */
.memo-toolbar {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-2);
  padding: var(--yaar-sp-2) var(--yaar-sp-3);
  background: var(--yaar-bg-surface);
  border-bottom: 1px solid var(--yaar-border);
  flex-shrink: 0;
}

.memo-toolbar-title {
  font-weight: 600;
  font-size: 14px;
  color: var(--yaar-text);
  flex: 1;
}

.memo-search {
  flex: 1;
  max-width: 240px;
}

/* Layout */
.memo-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Sidebar */
.memo-sidebar {
  width: 240px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--yaar-border);
  overflow: hidden;
}

.memo-list {
  flex: 1;
  overflow-y: auto;
  padding: var(--yaar-sp-1) 0;
}

.memo-list-item {
  padding: var(--yaar-sp-2) var(--yaar-sp-3);
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background 0.15s, border-color 0.15s;
  position: relative;
}

.memo-list-item:hover {
  background: rgba(255,255,255,0.04);
}

.memo-list-item.active {
  background: rgba(88,166,255,0.08);
  border-left-color: var(--yaar-accent);
}

.memo-list-item-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--yaar-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}

.memo-list-item-preview {
  font-size: 11px;
  color: var(--yaar-text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.memo-list-item-date {
  font-size: 10px;
  color: var(--yaar-text-muted);
  opacity: 0.6;
  margin-top: 2px;
}

/* Main Content */
.memo-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.memo-editor {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: var(--yaar-sp-3);
  gap: var(--yaar-sp-2);
  overflow: hidden;
}

.memo-editor-title {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--yaar-border);
  color: var(--yaar-text);
  font-family: var(--yaar-font);
  font-size: 18px;
  font-weight: 600;
  padding: var(--yaar-sp-2) 0;
  outline: none;
  transition: border-color 0.15s;
}

.memo-editor-title:focus {
  border-bottom-color: var(--yaar-accent);
}

.memo-editor-title::placeholder {
  color: var(--yaar-text-muted);
  opacity: 0.5;
}

.memo-editor-body {
  flex: 1;
  width: 100%;
  background: transparent;
  border: none;
  color: var(--yaar-text);
  font-family: var(--yaar-font);
  font-size: 13px;
  line-height: 1.6;
  resize: none;
  outline: none;
  padding: var(--yaar-sp-1) 0;
}

.memo-editor-body::placeholder {
  color: var(--yaar-text-muted);
  opacity: 0.5;
}

.memo-editor-actions {
  display: flex;
  gap: var(--yaar-sp-2);
  flex-shrink: 0;
}

/* Empty state */
.memo-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--yaar-text-muted);
  gap: var(--yaar-sp-2);
}

.memo-empty-icon {
  font-size: 48px;
  opacity: 0.2;
}

.memo-empty-text {
  font-size: 13px;
  opacity: 0.5;
}

/* View mode */
.memo-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: var(--yaar-sp-3);
  gap: var(--yaar-sp-2);
  overflow: hidden;
}

.memo-view-header {
  display: flex;
  align-items: flex-start;
  gap: var(--yaar-sp-2);
  border-bottom: 1px solid var(--yaar-border);
  padding-bottom: var(--yaar-sp-2);
  flex-shrink: 0;
}

.memo-view-title {
  flex: 1;
  font-size: 18px;
  font-weight: 600;
  color: var(--yaar-text);
  min-width: 0;
  word-break: break-word;
}

.memo-view-meta {
  font-size: 11px;
  color: var(--yaar-text-muted);
  margin-top: 2px;
}

.memo-view-actions {
  display: flex;
  gap: var(--yaar-sp-1);
  flex-shrink: 0;
}

.memo-view-body {
  flex: 1;
  overflow-y: auto;
  font-size: 13px;
  line-height: 1.7;
  color: var(--yaar-text);
  white-space: pre-wrap;
  word-break: break-word;
}

/* Delete confirm */
.memo-delete-confirm {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-2);
  padding: var(--yaar-sp-2) var(--yaar-sp-3);
  background: rgba(248,81,73,0.08);
  border-top: 1px solid rgba(248,81,73,0.2);
  font-size: 12px;
  color: var(--yaar-text-muted);
  flex-shrink: 0;
}

.memo-count-badge {
  font-size: 10px;
  background: var(--yaar-border);
  color: var(--yaar-text-muted);
  border-radius: 10px;
  padding: 1px 6px;
  margin-left: auto;
}
