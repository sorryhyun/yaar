  margin: 0;
  font-family: var(--yaar-font);
  background: var(--yaar-bg);
  user-select: none;
  color: var(--yaar-text);
}
.wrap {
  padding: 10px;
  display: grid;
  gap: 8px;
}
.toolbar {
  display: grid;
  gap: 8px;
  padding: 10px;
  border: 1px solid var(--yaar-border);
  border-radius: 12px;
  background: var(--yaar-bg-surface);
  box-shadow: var(--yaar-shadow-sm);
  position: sticky;
  top: 8px;
  z-index: 10;
}
.toolbar-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: nowrap;
  min-width: 0;
  overflow-x: auto;
  overflow-y: hidden;
  padding-bottom: 2px;
}
.toolbar-row.file #storagePathInput {
  flex: 1 1 280px;
  min-width: 240px;
}
.toolbar-row.edit #formulaInput {
  flex: 1 1 360px;
  min-width: 260px;
}
.toolbar-row.edit .name {
  flex: 0 0 auto;
}
.name {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-weight: 700;
  min-width: 78px;
  text-align: center;
  border: 1px solid var(--yaar-border);
  border-radius: 8px;
  padding: 7px 8px;
  background: var(--yaar-bg);
  color: var(--yaar-text);
}
input,
select {
  height: 34px;
  padding: 6px 9px;
  border: 1px solid var(--yaar-border);
  border-radius: 8px;
  font-size: 13px;
  background: var(--yaar-bg-surface);
  color: var(--yaar-text);
  box-sizing: border-box;
}
input::placeholder {
  color: var(--yaar-text-muted);
}
#formulaInput {
  width: 100%;
}
#storagePathInput {
  min-width: 260px;
}
#textColor,
#bgColor {
  width: 42px;
  padding: 2px;
}
button.active {
  background: color-mix(in srgb, var(--yaar-accent) 15%, var(--yaar-bg-surface));
  border-color: var(--yaar-accent);
}
.sheetWrap {
  overflow: auto;
  border: 1px solid var(--yaar-border);
  border-radius: 10px;
  background: var(--yaar-bg-surface);
  max-height: calc(100vh - 160px);
}
.chartPanel {
  border: 1px solid var(--yaar-border);
  border-radius: 10px;
  background: var(--yaar-bg-surface);
  padding: 8px;
  display: none;
  min-height: 220px;
}
.chartPanel.open {
  display: block;
}
.chartPanelHead {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  color: var(--yaar-text);
  font-size: 13px;
}
#chartCanvas {
  width: 100%;
  max-height: 220px;
}
.statsPanel {
  border: 1px solid var(--yaar-border);
  border-radius: 10px;
  background: var(--yaar-bg-surface);
  padding: 10px;
  display: none;
}
.statsPanel.open {
  display: block;
}
.statsGrid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 8px;
}
.statCard {
  border: 1px solid var(--yaar-border);
  border-radius: 8px;
  background: var(--yaar-bg);
  padding: 8px;
}
.statLabel {
  font-size: 11px;
  color: var(--yaar-text-muted);
}
.statValue {
  font-size: 14px;
  font-weight: 700;
  color: var(--yaar-text);
  margin-top: 2px;
}
table {
  border-collapse: collapse;
  min-width: 1250px;
  table-layout: fixed;
}
th,
td {
  border: 1px solid var(--yaar-border);
}
th {
  position: sticky;
  top: 0;
  background: var(--yaar-bg-surface-hover);
  z-index: 2;
  font-weight: 600;
  color: var(--yaar-text);
}
.rowHead {
  position: sticky;
  left: 0;
  background: var(--yaar-bg-surface-hover);
  z-index: 1;
  text-align: right;
  padding: 6px 8px;
  min-width: 46px;
  color: var(--yaar-text-muted);
}
.corner {
  position: sticky;
  left: 0;
  top: 0;
  z-index: 3;
  background: var(--yaar-bg-surface-hover);
  min-width: 46px;
}
td {
  position: relative;
  min-width: 98px;
}
td input {
  width: 100%;
  border: none;
  padding: 7px 8px;
  box-sizing: border-box;
  outline: none;
  background: transparent;
  color: var(--yaar-text);
  height: 100%;
}
td.selected {
  background: color-mix(in srgb, var(--yaar-accent) 15%, var(--yaar-bg-surface));
  box-shadow: inset 0 0 0 1px var(--yaar-accent);
}
td.active {
  box-shadow: inset 0 0 0 2px var(--yaar-accent);
  z-index: 1;
}
.fill-handle {
  position: absolute;
  width: 8px;
  height: 8px;
