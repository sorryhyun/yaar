@font-face{font-family:'NanumSquareNeo';src:url('/NanumSquareNeoOTF-Rg.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap}

:root {

  --yaar-success: #3fb950;
  --yaar-error: #f85149;
  --yaar-warning: #d29922;
  --yaar-sp-1: 4px;
  --yaar-sp-2: 8px;
  --yaar-sp-3: 12px;
  --yaar-sp-4: 16px;
  --yaar-sp-5: 20px;
  --yaar-sp-6: 24px;
  --yaar-sp-8: 32px;

}

  color-scheme: light;
  --yaar-bg: #f8f9fa;
  --yaar-bg-surface: #ffffff;
  --yaar-bg-surface-hover: #f0f1f3;
  --yaar-text: #1f2328;
  --yaar-text-muted: #656d76;
  --yaar-text-dim: #8b949e;
  --yaar-border: #d0d7de;
  --yaar-shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.08);
  --yaar-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}
body {
  margin: 0;
  font-family: Inter, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', Arial, sans-serif;
  background: var(--yaar-bg);
  user-select: none;
  color: var(--yaar-text);
}
.wrap {
  padding: 10px;
  display: grid;
  gap: 8px;
}
.toolbar {
  display: grid;
  gap: 8px;
  padding: 10px;
  border: 1px solid var(--yaar-border);
  border-radius: 12px;
  background: var(--yaar-bg-surface);
  box-shadow: var(--yaar-shadow-sm);
  position: sticky;
  top: 8px;
  z-index: 10;
}
.toolbar-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: nowrap;
  min-width: 0;
  overflow-x: auto;
  overflow-y: hidden;
  padding-bottom: 2px;
}
.toolbar-row.file #storagePathInput {
  flex: 1 1 280px;
  min-width: 240px;
}
.toolbar-row.edit #formulaInput {
  flex: 1 1 360px;
  min-width: 260px;
}
.toolbar-row.edit .name {
  flex: 0 0 auto;
}
.name {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-weight: 700;
  min-width: 78px;
  text-align: center;
  border: 1px solid var(--yaar-border);
  border-radius: 8px;
  padding: 7px 8px;
  background: var(--yaar-bg);
}
input,
select {
  height: 34px;
  padding: 6px 9px;
  border: 1px solid var(--yaar-border);
  border-radius: 8px;
  font-size: 13px;
  background: var(--yaar-bg-surface);
  box-sizing: border-box;
}
#formulaInput {
  width: 100%;
}
#storagePathInput {
  min-width: 260px;
}
#textColor,
#bgColor {
  width: 42px;
  padding: 2px;
}
button.active {
  background: #dce8ff;
  border-color: #89abf0;
}
.sheetWrap {
  overflow: auto;
  border: 1px solid var(--yaar-border);
  border-radius: 10px;
  background: var(--yaar-bg-surface);
  max-height: calc(100vh - 160px);
}
.chartPanel {
  border: 1px solid var(--yaar-border);
  border-radius: 10px;
  background: var(--yaar-bg-surface);
  padding: 8px;
  display: none;
  min-height: 220px;
}
.chartPanel.open {
  display: block;
}
.chartPanelHead {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  color: var(--yaar-text);
  font-size: 13px;
}
#chartCanvas {
  width: 100%;
  max-height: 220px;
}
.statsPanel {
  border: 1px solid var(--yaar-border);
  border-radius: 10px;
  background: var(--yaar-bg-surface);
  padding: 10px;
  display: none;
}
.statsPanel.open {
  display: block;
}
.statsGrid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 8px;
}
.statCard {
  border: 1px solid var(--yaar-border);
  border-radius: 8px;
  background: var(--yaar-bg);
  padding: 8px;
}
.statLabel {
  font-size: 11px;
  color: var(--yaar-text-muted);
}
.statValue {
  font-size: 14px;
  font-weight: 700;
  color: var(--yaar-text);
  margin-top: 2px;
}
table {
  border-collapse: collapse;
  min-width: 1250px;
  table-layout: fixed;
}
th,
td {
  border: 1px solid #e7ecf5;
}
th {
  position: sticky;
  top: 0;
  background: #f8faff;
  z-index: 2;
  font-weight: 600;
}
.rowHead {
  position: sticky;
  left: 0;
  background: #f8faff;
  z-index: 1;
  text-align: right;
  padding: 6px 8px;
  min-width: 46px;
}
.corner {
  position: sticky;
  left: 0;
  top: 0;
  z-index: 3;
  background: #eef3ff;
  min-width: 46px;
}
td {
  position: relative;
  min-width: 98px;
}
td input {
  width: 100%;
  border: none;
  padding: 7px 8px;
  box-sizing: border-box;
  outline: none;
  background: transparent;
}
td.selected {
  background: #dce8ff;
  box-shadow: inset 0 0 0 1px #93b4f4;
}
td.active {
  box-shadow: inset 0 0 0 2px #2a6df6;
  z-index: 1;
}
.fill-handle {
  position: absolute;
  width: 8px;
  height: 8px;
  right: -4px;
  bottom: -4px;
  border-radius: 1px;
  background: #2a6df6;
  cursor: crosshair;
  z-index: 5;
}
td.fill-preview {
  background: #c7dcff;
  box-shadow: inset 0 0 0 1px #79a3ff;
}
.hint {
  color: #5c6475;
  font-size: 12px;
  display: none;
}
@media (max-width: 1200px) {
  #formulaInput,
  #storagePathInput {
    min-width: 220px;
  }
}
