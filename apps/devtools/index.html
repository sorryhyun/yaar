:root {
  --yaar-bg: #0f1117;
  --yaar-bg-surface: #161b22;
  --yaar-bg-surface-hover: #1c2129;
  --yaar-text: #e6edf3;
  --yaar-text-muted: #8b949e;
  --yaar-text-dim: #6e7681;
  --yaar-accent: #58a6ff;
  --yaar-accent-hover: #79c0ff;
  --yaar-border: #30363d;
  --yaar-success: #3fb950;
  --yaar-error: #f85149;
  --yaar-warning: #d29922;
  --yaar-sp-1: 4px;
  --yaar-sp-2: 8px;
  --yaar-sp-3: 12px;
  --yaar-sp-4: 16px;
  --yaar-sp-5: 20px;
  --yaar-sp-6: 24px;
  --yaar-sp-8: 32px;
  --yaar-radius-sm: 4px;
  --yaar-radius: 6px;
  --yaar-radius-lg: 10px;
  --yaar-font: 'NanumSquareNeo', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --yaar-font-mono: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Consolas, monospace;
  --yaar-text-xs: 11px;
  --yaar-text-sm: 12px;
  --yaar-text-base: 13px;
  --yaar-text-lg: 15px;
  --yaar-text-xl: 18px;
  --yaar-shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --yaar-shadow: 0 2px 8px rgba(0,0,0,.4);
  --yaar-shadow-lg: 0 8px 24px rgba(0,0,0,.5);
  --yaar-ease: 150ms ease;
}

.y-btn-ghost{border-color:transparent;background:transparent}.y-btn-ghost:hover{background:var(--yaar-bg-surface)}
.y-btn-sm{padding:var(--yaar-sp-1) var(--yaar-sp-2);font-size:var(--yaar-text-xs)}
.y-input{width:100%;padding:var(--yaar-sp-2) var(--yaar-sp-3);border:1px solid var(--yaar-border);border-radius:var(--yaar-radius);background:var(--yaar-bg);color:var(--yaar-text);font-size:var(--yaar-text-sm);outline:none;transition:border-color var(--yaar-ease)}

.y-badge-warning{color:var(--yaar-warning);border-color:var(--yaar-warning);background:rgba(210,153,34,.1)}

  height: 100%;
}

.devtools {
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  height: 100%;
  background: var(--yaar-bg);
  color: var(--yaar-text);
  font-family: var(--yaar-font);
  font-size: 13px;
}

/* â”€â”€ Toolbar â”€â”€ */
.toolbar {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-2);
  padding: var(--yaar-sp-1) var(--yaar-sp-2);
  background: var(--yaar-bg-surface);
  border-bottom: 1px solid var(--yaar-border);
}

.toolbar .project-select {
  flex: 1;
  min-width: 0;
}

/* â”€â”€ Tab Bar â”€â”€ */
.tab-bar {
  display: flex;
  overflow-x: auto;
  background: var(--yaar-bg-surface);
  border-bottom: 1px solid var(--yaar-border);
  min-height: 0;
}

.tab {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-1);
  padding: 4px 12px;
  cursor: pointer;
  flex-shrink: 0;
  font-size: 12px;
  color: var(--yaar-text-muted);
  border-bottom: 2px solid transparent;
  user-select: none;
}

.tab:hover {
  color: var(--yaar-text);
  background: var(--yaar-bg-hover);
}

.tab.active {
  color: var(--yaar-text);
  border-bottom-color: var(--yaar-accent);
}

.tab-close {
  font-size: 14px;
  line-height: 1;
  opacity: 0;
  cursor: pointer;
  padding: 0 2px;
  border-radius: 3px;
}

.tab:hover .tab-close {
  opacity: 0.6;
}

.tab-close:hover {
  opacity: 1 !important;
  background: var(--yaar-bg-hover);
}

/* â”€â”€ Main area â”€â”€ */
.main-area {
  display: grid;
  grid-template-columns: 180px 1fr;
  min-height: 0;
  overflow: hidden;
}

/* â”€â”€ File tree â”€â”€ */
.file-tree {
  border-right: 1px solid var(--yaar-border);
  overflow-y: auto;
  padding: var(--yaar-sp-1) 0;
}

.file-tree-empty {
  padding: var(--yaar-sp-3);
  text-align: center;
}

.file-tree-item {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  cursor: pointer;
  white-space: nowrap;
  border-radius: 3px;
  margin: 0 4px;
  min-width: 0;
}

.file-tree-item:hover {
  background: var(--yaar-bg-hover);
}

.file-tree-item.active {
  background: var(--yaar-accent);
  color: #fff;
}

.file-tree-item.dir {
  font-weight: 500;
}

.file-icon {
  font-size: 10px;
  flex-shrink: 0;
  width: 14px;
  text-align: center;
  color: var(--yaar-text-muted);
  font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
}

.file-tree-item.active .file-icon {
  color: inherit;
}

.file-name {
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}

/* â”€â”€ Editor area â”€â”€ */
.editor-area {
  display: grid;
  grid-template-rows: 1fr auto;
  min-height: 0;
  overflow: hidden;
}

.editor {
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}

.editor-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
}

.editor-header {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-1);
  padding: var(--yaar-sp-1) var(--yaar-sp-2);
  border-bottom: 1px solid var(--yaar-border);
  background: var(--yaar-bg-surface);
}

.editor-content {
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

.editor-overlay {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.editor-highlight,
.editor-textarea {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  margin: 0;
  padding: var(--yaar-sp-2);
  font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.5;
  tab-size: 2;
  white-space: pre;
  overflow: auto;
  border: none;
  box-sizing: border-box;
}

.editor-highlight {
  pointer-events: none;
  background: var(--yaar-bg);
  color: var(--yaar-text);
  z-index: 0;
}

.editor-highlight code {
  font-family: inherit;
  font-size: inherit;
  line-height: inherit;
  tab-size: inherit;
}

.editor-textarea {
  background: transparent;
  color: transparent;
  caret-color: var(--yaar-text);
  outline: none;
  resize: none;
  z-index: 1;
  -webkit-text-fill-color: transparent;
}

/* â”€â”€ Prism Token Colors (dark theme) â”€â”€ */
.editor-highlight .token.comment,
.editor-highlight .token.prolog,
.editor-highlight .token.doctype,
.editor-highlight .token.cdata {
  color: #6a737d;
}

.editor-highlight .token.punctuation {
  color: #e6edf3;
}

.editor-highlight .token.property,
.editor-highlight .token.tag,
.editor-highlight .token.boolean,
.editor-highlight .token.number,
.editor-highlight .token.constant,
.editor-highlight .token.symbol,
.editor-highlight .token.deleted {
  color: #79c0ff;
}

.editor-highlight .token.selector,
.editor-highlight .token.attr-name,
.editor-highlight .token.string,
.editor-highlight .token.char,
.editor-highlight .token.builtin,
.editor-highlight .token.inserted {
  color: #a5d6ff;
}

.editor-highlight .token.operator,
.editor-highlight .token.entity,
.editor-highlight .token.url {
  color: #e6edf3;
}

.editor-highlight .token.atrule,
.editor-highlight .token.attr-value,
.editor-highlight .token.keyword {
  color: #ff7b72;
}

.editor-highlight .token.function,
.editor-highlight .token.class-name {
  color: #d2a8ff;
}

.editor-highlight .token.regex,
.editor-highlight .token.important,
.editor-highlight .token.variable {
  color: #ffa657;
}

.editor-highlight .token.string {
  color: #a5d6ff;
}

.editor-highlight .token.builtin {
  color: #79c0ff;
}

.dirty-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--yaar-accent);
  display: inline-block;
  flex-shrink: 0;
}

/* â”€â”€ Diagnostics / Bottom Panel â”€â”€ */
.diagnostics {
  border-top: 1px solid var(--yaar-border);
  max-height: 200px;
  display: flex;
  flex-direction: column;
}

.diagnostics:has(.diff-panel) {
  max-height: 50vh;
}

.bottom-tabs {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--yaar-bg-surface);
  border-bottom: 1px solid var(--yaar-border);
}

.bottom-tab {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: var(--yaar-sp-1) var(--yaar-sp-2);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--yaar-text-muted);
  cursor: pointer;
  font-weight: 600;
  font-family: inherit;
}

.bottom-tab:hover {
  color: var(--yaar-text);
}

.bottom-tab.active {
  color: var(--yaar-text);
  border-bottom-color: var(--yaar-accent);
}

.bottom-tab-action {
  margin-left: auto;
  padding: 2px var(--yaar-sp-2);
  background: none;
  border: none;
  color: var(--yaar-text-muted);
  cursor: pointer;
  font-family: inherit;
}

.bottom-tab-action:hover {
  color: var(--yaar-text);
}

.diagnostics-count {
  font-size: 10px;
  padding: 1px 5px;
}

.diagnostics-list,
.console-list {
  overflow-y: auto;
  flex: 1;
}

.diagnostics-empty {
  padding: var(--yaar-sp-2);
  text-align: center;
}

.diagnostics-item {
  display: flex;
  align-items: flex-start;
  gap: var(--yaar-sp-1);
  padding: 3px var(--yaar-sp-2);
  cursor: pointer;
  border-bottom: 1px solid var(--yaar-border);
}

.diagnostics-item:hover {
  background: var(--yaar-bg-hover);
}

.diagnostics-item.error {
  color: var(--yaar-error);
}

.diagnostics-item.warning {
  color: var(--yaar-warning, #d29922);
}

.diag-icon {
  flex-shrink: 0;
  font-size: 11px;
}

.diag-location {
  flex-shrink: 0;
  opacity: 0.7;
  font-family: monospace;
}

.diag-message {
  flex: 1;
  min-width: 0;
}

/* â”€â”€ Console entries â”€â”€ */
.console-entry {
  display: flex;
  align-items: flex-start;
  gap: var(--yaar-sp-1);
  padding: 2px var(--yaar-sp-2);
  border-bottom: 1px solid var(--yaar-border);
}

.console-entry.warn {
  color: var(--yaar-warning, #d29922);
}

.console-entry.error {
  color: var(--yaar-error);
}

.console-level {
  flex-shrink: 0;
  font-size: 10px;
}

.console-time {
  flex-shrink: 0;
  opacity: 0.5;
  font-family: monospace;
}

.console-args {
  flex: 1;
  min-width: 0;
  font-family: monospace;
  white-space: pre-wrap;
  word-break: break-all;
}

/* â”€â”€ Diff Panel â”€â”€ */
.diff-panel {
  overflow: auto;
  flex: 1;
  min-height: 0;
}

.diff-input-area {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--yaar-sp-2);
  padding: var(--yaar-sp-2);
  height: 100%;
}

.diff-input-col {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 0;
}

.diff-textarea {
  flex: 1;
  min-height: 60px;
  font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
  font-size: 12px;
  line-height: 1.4;
  tab-size: 2;
  background: var(--yaar-bg);
  color: var(--yaar-text);
  border: 1px solid var(--yaar-border);
  border-radius: 4px;
  padding: var(--yaar-sp-1);
  resize: none;
  outline: none;
  white-space: pre;
  overflow: auto;
}

.diff-textarea:focus {
  border-color: var(--yaar-accent);
}

.diff-actions {
  grid-column: 1 / -1;
  display: flex;
  justify-content: flex-end;
}

.diff-toolbar {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-2);
  padding: 4px var(--yaar-sp-2);
  background: var(--yaar-bg-surface);
  border-bottom: 1px solid var(--yaar-border);
}

.diff-output {
  overflow: auto;
  font-size: 12px;
  line-height: 1.4;
}

/* diff2html theme overrides for dark mode */
.diff-output .d2h-wrapper {
  background: var(--yaar-bg);
}

.diff-output .d2h-file-header,
.diff-output .d2h-file-diff {
  background: var(--yaar-bg);
  border-color: var(--yaar-border);
}

.diff-output .d2h-code-linenumber,
.diff-output .d2h-code-line {
  background: var(--yaar-bg);
  color: var(--yaar-text);
  border-color: var(--yaar-border);
}

.diff-output .d2h-del {
  background: rgba(248, 81, 73, 0.15);
}

.diff-output .d2h-ins {
  background: rgba(63, 185, 80, 0.15);
}

.diff-output .d2h-del .d2h-code-line-ctn {
  background: rgba(248, 81, 73, 0.15);
}

.diff-output .d2h-ins .d2h-code-line-ctn {
  background: rgba(63, 185, 80, 0.15);
}

.diff-output .d2h-info {
  background: rgba(88, 166, 255, 0.1);
  color: var(--yaar-accent);
  border-color: var(--yaar-border);
}

.diff-output .d2h-code-linenumber {
  color: var(--yaar-text-muted);
}

.diff-output .d2h-file-list-title,
.diff-output .d2h-file-list-line {
  display: none;
}

.diff-output del,
.diff-output .d2h-del .d2h-code-line-ctn del {
  background: rgba(248, 81, 73, 0.4);
  text-decoration: none;
}

.diff-output ins,
.diff-output .d2h-ins .d2h-code-line-ctn ins {
  background: rgba(63, 185, 80, 0.4);
  text-decoration: none;
}

/* â”€â”€ Statusbar â”€â”€ */
.statusbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 2px var(--yaar-sp-2);
  background: var(--yaar-bg-surface);
  border-top: 1px solid var(--yaar-border);
  font-size: 11px;
  color: var(--yaar-text-muted);
}

.statusbar .status-indicator {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--yaar-text-muted);
}

.statusbar .status-indicator.success {
  background: var(--yaar-success);
}

.statusbar .status-indicator.error {
  background: var(--yaar-error);
}
