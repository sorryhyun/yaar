  --yaar-border: #30363d;
  --yaar-success: #3fb950;
  --yaar-error: #f85149;
  --yaar-warning: #d29922;
  --yaar-sp-1: 4px;
  --yaar-sp-2: 8px;
  --yaar-sp-3: 12px;
  --yaar-sp-4: 16px;
  --yaar-sp-5: 20px;
  --yaar-sp-6: 24px;

  display: flex;
  overflow-x: auto;
  background: var(--yaar-bg-surface);
  border-bottom: 1px solid var(--yaar-border);
  min-height: 0;
}

.tab {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-1);
  padding: 4px 12px;
  cursor: pointer;
  flex-shrink: 0;
  font-size: 12px;
  color: var(--yaar-text-muted);
  border-bottom: 2px solid transparent;
  user-select: none;
}

.tab:hover {
  color: var(--yaar-text);
  background: var(--yaar-bg-hover);
}

.tab.active {
  color: var(--yaar-text);
  border-bottom-color: var(--yaar-accent);
}

.tab-close {
  font-size: 14px;
  line-height: 1;
  opacity: 0;
  cursor: pointer;
  padding: 0 2px;
  border-radius: 3px;
}

.tab:hover .tab-close {
  opacity: 0.6;
}

.tab-close:hover {
  opacity: 1 !important;
  background: var(--yaar-bg-hover);
}

/* ── Main area ── */
.main-area {
  display: grid;
  grid-template-columns: 180px 1fr;
  min-height: 0;
  overflow: hidden;
}

/* ── File tree ── */
.file-tree {
  border-right: 1px solid var(--yaar-border);
  overflow-y: auto;
  padding: var(--yaar-sp-1) 0;
}

.file-tree-empty {
  padding: var(--yaar-sp-3);
  text-align: center;
}

.file-tree-item {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-1);
  padding: 3px 8px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-radius: 3px;
  margin: 0 4px;
}

.file-tree-item:hover {
  background: var(--yaar-bg-hover);
}

.file-tree-item.active {
  background: var(--yaar-accent);
  color: #fff;
}

.file-tree-item.dir {
  opacity: 0.8;
}

.file-icon {
  font-size: 12px;
  flex-shrink: 0;
}

.file-name {
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Editor area ── */
.editor-area {
  display: grid;
  grid-template-rows: 1fr auto;
  min-height: 0;
  overflow: hidden;
}

.editor {
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}

.editor-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
}

.editor-header {
  display: flex;
  align-items: center;
  gap: var(--yaar-sp-1);
  padding: var(--yaar-sp-1) var(--yaar-sp-2);
  border-bottom: 1px solid var(--yaar-border);
  background: var(--yaar-bg-surface);
}

.editor-content {
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

.editor-textarea {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: var(--yaar-sp-2);
  font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.5;
  tab-size: 2;
  background: var(--yaar-bg);
  color: var(--yaar-text);
  border: none;
  outline: none;
  resize: none;
  white-space: pre;
  overflow: auto;
}

.dirty-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--yaar-accent);
  display: inline-block;
  flex-shrink: 0;
}

/* ── Diagnostics / Bottom Panel ── */
.diagnostics {
  border-top: 1px solid var(--yaar-border);
  max-height: 150px;
  display: flex;
  flex-direction: column;
}

.bottom-tabs {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--yaar-bg-surface);
  border-bottom: 1px solid var(--yaar-border);
}

.bottom-tab {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: var(--yaar-sp-1) var(--yaar-sp-2);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--yaar-text-muted);
  cursor: pointer;
  font-weight: 600;
  font-family: inherit;
}

.bottom-tab:hover {
  color: var(--yaar-text);
}

.bottom-tab.active {
  color: var(--yaar-text);
  border-bottom-color: var(--yaar-accent);
}

.bottom-tab-action {
  margin-left: auto;
  padding: 2px var(--yaar-sp-2);
  background: none;
  border: none;
  color: var(--yaar-text-muted);
  cursor: pointer;
  font-family: inherit;
}

.bottom-tab-action:hover {
  color: var(--yaar-text);
}

.diagnostics-count {
  font-size: 10px;
  padding: 1px 5px;
}

.diagnostics-list,
.console-list {
  overflow-y: auto;
  flex: 1;
}

.diagnostics-empty {
  padding: var(--yaar-sp-2);
  text-align: center;
}

.diagnostics-item {
  display: flex;
  align-items: flex-start;
  gap: var(--yaar-sp-1);
  padding: 3px var(--yaar-sp-2);
  cursor: pointer;
  border-bottom: 1px solid var(--yaar-border);
}

.diagnostics-item:hover {
  background: var(--yaar-bg-hover);
}

.diagnostics-item.error {
  color: var(--yaar-error);
}

.diagnostics-item.warning {
  color: var(--yaar-warning, #d29922);
}

.diag-icon {
  flex-shrink: 0;
  font-size: 11px;
}

.diag-location {
  flex-shrink: 0;
  opacity: 0.7;
  font-family: monospace;
}

.diag-message {
  flex: 1;
  min-width: 0;
}

/* ── Console entries ── */
.console-entry {
  display: flex;
  align-items: flex-start;
  gap: var(--yaar-sp-1);
  padding: 2px var(--yaar-sp-2);
  border-bottom: 1px solid var(--yaar-border);
}

.console-entry.warn {
  color: var(--yaar-warning, #d29922);
}

.console-entry.error {
  color: var(--yaar-error);
}

.console-level {
  flex-shrink: 0;
  font-size: 10px;
}

.console-time {
  flex-shrink: 0;
  opacity: 0.5;
  font-family: monospace;
}

.console-args {
  flex: 1;
  min-width: 0;
  font-family: monospace;
  white-space: pre-wrap;
  word-break: break-all;
}

/* ── Statusbar ── */
.statusbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 2px var(--yaar-sp-2);
  background: var(--yaar-bg-surface);
  border-top: 1px solid var(--yaar-border);
  font-size: 11px;
  color: var(--yaar-text-muted);
}

.statusbar .status-indicator {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--yaar-text-muted);
}

.statusbar .status-indicator.success {
  background: var(--yaar-success);
}

.statusbar .status-indicator.error {
  background: var(--yaar-error);
}

.statusbar .status-indicator.compiling {
  background: var(--yaar-accent);
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%,
  100% {
    opacity: 1;
  }
  50% {
    opacity: 0.4;
  }
}
