  .file-row.selected { background: var(--yaar-accent-hover); }

  .file-icon { width: 24px; text-align: center; font-size: 16px; flex-shrink: 0; }

    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .file-name.dir { color: var(--yaar-accent); }

  .file-row:hover .file-actions { opacity: 1; }
  .file-actions button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    border-radius: 3px;
    color: var(--yaar-text-muted);
  }
  .file-actions button:hover { background: var(--yaar-border); color: var(--yaar-text); }
  .file-actions button.danger:hover { color: var(--yaar-error, #f85149); }

    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--yaar-text-muted);
    font-size: 14px;
    padding: 40px;
  }
  .preview {
    width: 320px;
    border-left: 1px solid var(--yaar-border);

    flex-direction: column;

    flex-shrink: 0;
  }
  .preview.hidden { display: none; }

    background: none;
    border: none;
    color: var(--yaar-text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
  }

    flex: 1;

    margin: 0;
  }
  .preview-body img {
    max-width: 100%;
    border-radius: var(--yaar-radius);
  }
  .preview-meta {
    padding: 8px 12px;
    border-top: 1px solid var(--yaar-border);
    font-size: 11px;
    color: var(--yaar-text-muted);
  }

    padding: 4px 12px;
    background: var(--yaar-bg-surface);
    border-top: 1px solid var(--yaar-border);

    color: var(--yaar-text-muted);

  }

                <button class="danger" title="Delete" onClick=${async(e)=>{if(e.stopPropagation(),!confirm(`Delete "${i}"?`))return;try{await window.yaar?.storage?.remove(o.path),w(v())}catch{b(`Failed to delete ${i}`)}}}>&#x1F5D1;</button>
              </span>
            </div>
          `})}}
    </div>

    <div class=${()=>`preview${B()?"":" hidden"}`}>
      <div class="preview-header y-flex-between">
        <span class="y-truncate">${()=>D()}</span>
        <button class="preview-close" onClick=${hr}>&#x2715;</button>
      </div>
      <div class="preview-body" ref=${(r)=>{dr(r)}}></div>
      <div class="preview-meta y-text-xs y-text-muted">${()=>X()}</div>
    </div>
  </div>

  ${C(()=>G(),()=>y`
    <div class="modal-overlay" onClick=${(r)=>{if(r.target===r.currentTarget)O()}}>
      <div class="modal-card y-card">
        <div class="modal-title">Request Host Folder Mount</div>
        <div class="modal-note y-text-sm y-text-muted">The app cannot mount folders directly. Submit a request and the agent will ask for permission and run the mount tool.</div>
        <form class="modal-form" onSubmit=${gr}>
          <label class="modal-label y-text-xs y-text-muted">Mount alias</label>
          <input class="modal-input y-input" name="alias" placeholder="project-files" required
            ref=${(r)=>{ar(r)}} />
          <label class="modal-label y-text-xs y-text-muted">Host folder path</label>
          <input class="modal-input y-input" name="hostPath" placeholder="/Users/name/projects" required
            ref=${(r)=>{nr(r)}} />
          <label class="modal-check">
            <input type="checkbox" name="readOnly"
              ref=${(r)=>{pr(r)}} />
            Read-only mount
          </label>
          <div class="modal-actions">
            <button class="toolbar-btn y-btn y-btn-sm" type="button" onClick=${O}>Cancel</button>
            <button class="toolbar-btn y-btn y-btn-sm y-btn-primary" type="submit">Request Mount</button>
          </div>
        </form>
      </div>
    </div>
  `)}

  <div class="statusbar y-text-xs y-text-muted">${()=>b()}</div>
`);wr();w("");

</script>
