name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - run: bun install --frozen-lockfile

      - name: Build shared
        run: bun run --filter @yaar/shared build

      - name: Build compiler
        run: bun run --filter @yaar/compiler build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run --filter '*' test
