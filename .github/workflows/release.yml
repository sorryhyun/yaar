name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run --filter '*' build

      - name: Prebundle libraries
        run: bun run build:exe:libs

      - name: Build Windows executable
        run: bun run build:exe:bundle

      - name: Build Linux executable
        run: |
          bun run build:exe:bundle:linux
          mv dist/yaar dist/yaar-linux

      - name: Build macOS executable
        run: |
          bun run build:exe:bundle:macos
          mv dist/yaar dist/yaar-macos

      - name: Upload assets
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/yaar.exe \
            dist/yaar-linux \
            dist/yaar-macos \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
