name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run --filter '*' build

      - name: Prebundle libraries
        run: bun run build:exe:libs

      - name: Build Windows x64
        run: |
          bun scripts/build-exe-bundle.js --target windows --arch x64
          mv dist/yaar.exe dist/yaar-windows-x64.exe

      - name: Sign Windows executable
        if: env.HAS_CERT == 'true'
        env:
          HAS_CERT: ${{ secrets.DEV_CERT_PFX != '' }}
        run: |
          sudo apt-get install -y osslsigncode
          echo "${{ secrets.DEV_CERT_PFX }}" | base64 -d > dev-cert.pfx
          osslsigncode sign \
            -pkcs12 dev-cert.pfx \
            -pass "${{ secrets.DEV_CERT_PASSWORD }}" \
            -n "YAAR" \
            -t http://timestamp.digicert.com \
            -in dist/yaar-windows-x64.exe \
            -out dist/yaar-signed.exe
          mv dist/yaar-signed.exe dist/yaar-windows-x64.exe
          rm dev-cert.pfx

      - name: Build Linux x64
        run: |
          bun scripts/build-exe-bundle.js --target linux --arch x64
          mv dist/yaar dist/yaar-linux-x64

      - name: Build Linux arm64
        run: |
          bun scripts/build-exe-bundle.js --target linux --arch arm64
          mv dist/yaar dist/yaar-linux-arm64

      - name: Build macOS x64
        run: |
          bun scripts/build-exe-bundle.js --target macos --arch x64
          mv dist/yaar dist/yaar-macos-x64

      - name: Build macOS arm64 (Apple Silicon)
        run: |
          bun scripts/build-exe-bundle.js --target macos --arch arm64
          mv dist/yaar dist/yaar-macos-arm64

      - name: Upload assets
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/yaar-windows-x64.exe \
            dist/yaar-linux-x64 \
            dist/yaar-linux-arm64 \
            dist/yaar-macos-x64 \
            dist/yaar-macos-arm64 \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
